<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>__TITLE__ · Interactive Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.2/cytoscape.min.js"></script>
<style>
  :root {
    --bg:#0f1115; --bg2:#1a1d24; --bg3:#252932; --border:#2e3340;
    --text:#e8ebf0; --muted:#8a92a3; --accent:#5eead4;
    --hub:#a78bfa; --spoke:#60a5fa; --lookup:#fbbf24; --wf:#f87171; --subform:#7d8a9c;
    --read:#60a5fa; --write:#f87171; --match:#a78bfa; --cond:#fbbf24;
    --overlay:rgba(26,29,36,0.92);
  }
  /* Light theme has its own background/text set and a deeper role palette:
     the dark-theme pastels wash out on a light backdrop, so light mode uses
     saturated 600-weight colors that hold contrast (and keep white node text legible). */
  :root[data-theme="light"] {
    --bg:#f6f7f9; --bg2:#ffffff; --bg3:#eceff3; --border:#d3d8e0;
    --text:#1a1d24; --muted:#5b6472; --accent:#0d9488;
    --hub:#7c3aed; --spoke:#2563eb; --lookup:#d97706; --wf:#dc2626; --subform:#64748b;
    --read:#2563eb; --write:#dc2626; --match:#7c3aed; --cond:#d97706;
    --overlay:rgba(255,255,255,0.92);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:var(--bg);color:var(--text);overflow:hidden}
  body{display:grid;grid-template-rows:auto 1fr;grid-template-columns:1fr 380px;
       grid-template-areas:"toolbar toolbar" "graph panel"}
  /* toolbar */
  .toolbar{grid-area:toolbar;background:var(--bg2);border-bottom:1px solid var(--border);
           padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .toolbar h1{font-size:14px;font-weight:600;letter-spacing:0.3px}
  .toolbar h1 .sub{color:var(--muted);font-weight:400;margin-left:8px;font-size:12px}
  .toolbar .spacer{flex:1}
  .toolbar input,.toolbar select,.toolbar button{
    background:var(--bg3);color:var(--text);border:1px solid var(--border);
    padding:6px 10px;border-radius:5px;font-size:12px;font-family:inherit;outline:none}
  .toolbar input{width:200px}
  .toolbar input:focus{border-color:var(--accent)}
  .toolbar button{cursor:pointer;transition:all 0.15s}
  .toolbar button:hover{background:var(--border);border-color:var(--accent)}
  .toolbar .stats{color:var(--muted);font-size:11px;font-family:monospace}
  .toolbar .match-count{color:var(--accent);font-size:11px;font-family:monospace;
    white-space:nowrap;min-width:0}
  .toolbar .match-count:empty{display:none}
  /* graph */
  #cy{grid-area:graph;background:var(--bg);position:relative}
  .legend{position:absolute;bottom:12px;left:12px;background:var(--overlay);
          border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:11px;
          display:flex;gap:14px;flex-wrap:wrap;backdrop-filter:blur(6px)}
  .legend .item{display:flex;align-items:center;gap:6px}
  .legend .dot{width:10px;height:10px;border-radius:50%}
  /* side panel */
  .panel{grid-area:panel;background:var(--bg2);border-left:1px solid var(--border);
         overflow-y:auto;padding:18px}
  .panel.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);
               font-size:13px;text-align:center;padding:40px}
  .panel h2{font-size:16px;font-weight:600;margin-bottom:4px}
  .panel .role{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;
               text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px;font-weight:600}
  .role.Hub{background:#3b2d63;color:#d9c9ff}
  .role.Spoke{background:#1e3a5f;color:#bcdbff}
  .role.Lookup{background:#523a14;color:#ffe0a3}
  .role.Workflow{background:#5f2424;color:#ffc4c4}
  .role.Subform{background:#323b47;color:#c8d2de}
  .badge.off{background:#5f2424;color:#ffc4c4;font-size:10px;padding:2px 8px;
             border-radius:4px;text-transform:uppercase;letter-spacing:0.5px;
             font-weight:600;margin-left:6px;vertical-align:top}
  .panel .meta{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5}
  .panel .meta b{color:var(--text);font-weight:600}
  .panel .section{margin-top:18px;border-top:1px solid var(--border);padding-top:14px}
  .panel .section h3{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;
                     color:var(--muted);margin-bottom:10px}
  .panel input.field-search{width:100%;background:var(--bg3);color:var(--text);
      border:1px solid var(--border);padding:6px 10px;border-radius:5px;font-size:12px;
      outline:none;margin-bottom:8px}
  .panel input.field-search:focus{border-color:var(--accent)}
  .field-list{max-height:none}
  .field{padding:6px 8px;border-radius:4px;font-size:12px;cursor:pointer;
         border-left:2px solid transparent;transition:all 0.1s;font-family:monospace}
  .field:hover{background:var(--bg3)}
  .field.touched{border-left-color:var(--accent);background:rgba(94,234,212,0.06)}
  .field .fname{color:var(--text)}
  .field .flbl{color:var(--muted);font-size:10px;margin-left:6px;font-family:inherit}
  .field .ftype{color:var(--accent);font-size:10px;float:right;font-family:monospace}
  .field .badges{display:inline-flex;gap:4px;margin-left:6px}
  .field .chev{display:inline-block;width:0;height:0;margin-right:7px;vertical-align:middle;
         border-left:5px solid var(--muted);border-top:4px solid transparent;
         border-bottom:4px solid transparent;transition:transform 0.12s}
  .field.expanded .chev{transform:rotate(90deg);border-left-color:var(--accent)}
  .field-controls{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;
         background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 2px;margin-bottom:6px}
  .field-controls .exp-count{font-size:11px;color:var(--muted);font-family:monospace}
  .field-controls .spacer{flex:1}
  .mini-btn{background:var(--bg3);color:var(--text);border:1px solid var(--border);
         padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit}
  .mini-btn:hover{border-color:var(--accent)}
  .field-detail{margin:2px 0 8px 12px;padding:6px 10px;border-left:2px solid var(--border);
         background:var(--bg);border-radius:0 5px 5px 0}
  .field-detail h3{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;
         color:var(--muted);margin:12px 0 8px}
  .field-detail h3:first-child{margin-top:2px}
  .badge{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bg3);
         color:var(--muted);font-family:inherit;letter-spacing:0.3px}
  .badge.rel{background:#3b2d63;color:#d9c9ff}
  .badge.ref{background:#1e3a5f;color:#bcdbff}
  .badge.req{background:#5f2424;color:#ffc4c4}
  .wf-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;
           padding:10px 12px;margin-bottom:8px;font-size:12px;cursor:pointer}
  .wf-card:hover{border-color:var(--accent)}
  .wf-card .cs{font-family:monospace;color:var(--accent);font-size:11px}
  .wf-card .nm{font-weight:600;margin:2px 0}
  .wf-card .desc{color:var(--muted);font-size:11px;line-height:1.4}
  .usage{padding:6px 10px;border-radius:4px;font-size:11px;margin-bottom:6px;
         background:var(--bg3);border-left:3px solid var(--muted);font-family:monospace}
  .usage.Read{border-left-color:var(--read)}
  .usage.Write{border-left-color:var(--write)}
  .usage.Match{border-left-color:var(--match)}
  .usage.Condition{border-left-color:var(--cond)}
  .usage .dir{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;
              margin-right:6px;font-weight:600;text-transform:uppercase}
  .usage.Read .dir{background:var(--read);color:#0f1115}
  .usage.Write .dir{background:var(--write);color:#0f1115}
  .usage.Match .dir{background:var(--match);color:#0f1115}
  .usage.Condition .dir{background:var(--cond);color:#0f1115}
  .usage .ctx{color:var(--muted);font-size:10px;margin-top:3px;font-family:inherit}
  .close-btn{float:right;background:transparent;border:0;color:var(--muted);cursor:pointer;
             font-size:18px;line-height:1}
  .close-btn:hover{color:var(--text)}
  .empty-state{color:var(--muted);font-size:11px;font-style:italic;padding:6px 0}
</style>
<script>
  // Apply the saved theme before first paint to avoid a flash. Default dark.
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('explorer-theme') || 'dark'); } catch (e) {}
</script>
</head>
<body>

<div class="toolbar">
  <h1>__TITLE__<span class="sub">interactive map · click any node</span></h1>
  <input id="search" placeholder="Search forms, fields, conditions, actions..." autocomplete="off">
  <span class="match-count" id="match-count"></span>
  <select id="layout">
    <option value="preset">Layout: Hub &amp; Spoke</option>
    <option value="cose">Layout: Force</option>
    <option value="circle">Layout: Circle</option>
    <option value="grid">Layout: Grid</option>
    <option value="breadthfirst">Layout: Hierarchy</option>
  </select>
  <button id="fit">Fit</button>
  <button id="reset">Reset</button>
  <button id="theme-toggle" title="Toggle light / dark">Light mode</button>
  <div class="spacer"></div>
  <div class="stats" id="stats"></div>
</div>

<div id="cy"></div>

<div class="legend">
  <div class="item"><div class="dot" style="background:var(--hub)"></div>Hub</div>
  <div class="item"><div class="dot" style="background:var(--spoke)"></div>Spoke</div>
  <div class="item"><div class="dot" style="background:var(--lookup)"></div>Lookup</div>
  <div class="item"><div class="dot" style="background:var(--subform)"></div>Subform</div>
  <div class="item"><div class="dot" style="background:var(--wf)"></div>Workflow</div>
  <div class="item" style="color:var(--muted)">solid edge = relationship · dashed = workflow trigger/target · dimmed workflow = disabled</div>
</div>

<div class="panel empty" id="panel">
  Click a node to inspect.<br>Scroll to zoom · drag to pan.
</div>

<script>
const DATA = __DATA__;

const stats = document.getElementById('stats');
const refPullsByPair = {};  // pulls per source->target direction (drives the edge label)
const pullsByRel = {};      // pulls per individual relationship field (drives edge detail)
DATA.refPulls.forEach(r => {
  // resolve via -> target form using relationships
  const rel = DATA.relationships.find(x => x.source === r.destForm && x.via === r.via);
  if (rel) {
    refPullsByPair[r.destForm + '→' + rel.target] = (refPullsByPair[r.destForm + '→' + rel.target] || 0) + 1;
    pullsByRel[rel.source + '|' + rel.via] = (pullsByRel[rel.source + '|' + rel.via] || 0) + 1;
  }
});

stats.textContent = `${DATA.forms.length} forms · ${DATA.relationships.length} relationships · ${DATA.refPulls.length} ref-pulls · ${Object.values(DATA.fields).reduce((a,b)=>a+b.length,0)} fields · ${DATA.workflows.length} workflow`;

// Build cytoscape elements
const elements = [];
// Cytoscape renders nodes to a canvas, which can't resolve CSS var() strings —
// resolve the role colors to concrete hex from the active theme's computed styles,
// and recompute them when the theme changes (see setTheme).
const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim() || '#888';
function roleColors(){
  return {Hub:cssVar('--hub'), Spoke:cssVar('--spoke'), Lookup:cssVar('--lookup'),
          Subform:cssVar('--subform'), Workflow:cssVar('--wf')};
}
let ROLE_COLOR = roleColors();

DATA.forms.forEach(f => {
  elements.push({data:{id:f.name, label:f.name, role:f.role, fieldCount:f.fieldCount,
                       kind:'form'}});
});

// Workflow nodes. Disabled workflows are visually distinct (dimmed, dashed
// border, "(off)" label) — a configured-but-not-running automation must read
// as flagged, not identical to a live one.
DATA.workflows.forEach(w => {
  const off = w.enabled === false;
  elements.push({data:{id:'WF:'+w.callsign, label:w.callsign + (off ? '\n(off)' : ''),
                       role:'Workflow', kind:'workflow', wfRef:w.callsign},
                 classes: off ? 'wf-off' : undefined});
});

// Relationship edges — one per direction. A direction can carry many
// relationship fields (e.g. 325 -> 399 links through 32 measure-code fields);
// rendering each as its own arc would be an unreadable fan, so they aggregate
// into a single edge whose label names the field (or the count when several).
// The genuinely distinct edges to separate are the two *directions* of a pair
// (A -> B and B -> A), which the parallel-fan pass below pulls onto split arcs.
const relByDir = {};
DATA.relationships.forEach(r => {
  if (!DATA.forms.find(f => f.name === r.target)) return; // skip if target not in our form list
  const k = r.source + '→' + r.target;
  (relByDir[k] = relByDir[k] || {source:r.source, target:r.target, rels:[]}).rels.push({
    name: r.label || r.via, via: r.via, match: r.targetMatchField || '',
    pulls: pullsByRel[r.source + '|' + r.via] || 0,
  });
});
Object.values(relByDir).forEach(e => {
  const pulls = e.rels.reduce((a, r) => a + r.pulls, 0);
  const base = e.rels.length === 1 ? e.rels[0].via : `${e.rels.length} relationships`;
  // Carry the full relationship list on the edge so an edge click can render
  // every individual relationship even when the label is an aggregate count.
  elements.push({data:{
    id: `rel::${e.source}::${e.target}`,
    source:e.source, target:e.target,
    label: pulls > 0 ? `${base} · ${pulls} pulls` : base,
    kind:'relationship', rels: e.rels, pulls,
  }});
});

// Workflow edges
DATA.workflows.forEach(w => {
  if (w.trigger && w.trigger.form) {
    elements.push({data:{source:w.trigger.form, target:'WF:'+w.callsign,
      label:'trigger', kind:'wf-edge'}});
  }
  w.actions.forEach(a => {
    if (a.targetForm) {
      elements.push({data:{source:'WF:'+w.callsign, target:a.targetForm,
        label:a.type.replace('BuiltIn.',''), kind:'wf-edge'}});
    }
  });
});

// Taxi routing can't separate edges that share a node pair — they stack and
// their labels garble. Tag every edge whose endpoints (in either direction)
// are shared by another edge; those get bundled-bezier routing in the
// stylesheet, which auto-fans them along distinct arcs with their own labels.
(() => {
  const pairCount = {};
  const pairKey = e => [e.data.source, e.data.target].sort().join('');
  elements.forEach(e => {
    if (e.data.source && e.data.target) {
      const k = pairKey(e);
      pairCount[k] = (pairCount[k] || 0) + 1;
    }
  });
  elements.forEach(e => {
    if (e.data.source && e.data.target && pairCount[pairKey(e)] > 1) {
      e.classes = (e.classes ? e.classes + ' ' : '') + 'parallel';
    }
  });
})();

// Preset positions (hub-and-spoke layout), injected from the workspace's
// manual/explorer_layout.json. Empty when the workspace has no saved layout —
// the graph then falls back to the force-directed layout.
const PRESET = __PRESET__;
const hasPreset = Object.keys(PRESET).length > 0;
const FORCE = {name:'cose', animate:true, fit:true, padding:60, nodeRepulsion:8000,
               idealEdgeLength:120, gravity:0.5};
const INITIAL = hasPreset ? {name:'preset', positions: PRESET, fit:true, padding:60} : FORCE;

// Node width grows with field count (the bubble encoding) but never narrower than
// the label needs, capped at NODE_MAX_W; longer labels wrap to a second line.
const NODE_MAX_W = 144;
const baseW = ele => {
  if (ele.data('kind') === 'workflow') return 104;
  const byFields = 34 + Math.sqrt(ele.data('fieldCount') || 50) * 3.5;
  const byLabel  = Math.min(NODE_MAX_W, 26 + (ele.data('label') || '').length * 6.5);
  return Math.max(byFields, byLabel);
};
const baseH = ele => {
  if (ele.data('kind') === 'workflow') return 56;
  return Math.max(48, 34 + Math.sqrt(ele.data('fieldCount') || 50) * 3.5);
};

const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: elements,
  style: [
    {selector:'node', style:{
      'background-color': ele => ROLE_COLOR[ele.data('role')] || '#888',
      'label':'data(label)', 'color':'#ffffff', 'font-size':10, 'font-weight':600,
      'text-valign':'center', 'text-halign':'center', 'text-wrap':'wrap',
      'text-max-width': ele => baseW(ele) - 16, 'width': baseW, 'height': baseH,
      'shape':'round-rectangle',
      'border-width':2, 'border-color':'#0f1115',
      'transition-property':'background-color, border-color, border-width, opacity, width, height',
      'transition-duration': '180ms',
    }},
    {selector:'node:selected', style:{
      'border-color':'#5eead4', 'border-width':3
    }},
    {selector:'node.dim', style:{'opacity':0.18}},
    {selector:'node.wf-off', style:{
      'opacity':0.45, 'border-style':'dashed', 'border-color':'#f87171',
    }},
    {selector:'node.highlight', style:{'border-color':'#5eead4','border-width':3}},
    {selector:'edge', style:{
      'width': ele => Math.min(8, 1 + Math.log(1 + (parseInt((ele.data('label')||'').split('·')[1]) || 1))),
      'line-color':'#3a4050', 'target-arrow-color':'#3a4050',
      'target-arrow-shape':'triangle', 'curve-style':'round-taxi',
      'taxi-direction':'auto', 'taxi-turn':'50%', 'taxi-turn-min-distance':'12px',
      'taxi-radius':10,
      'label':'data(label)', 'font-size':10, 'font-weight':500, 'color':'#eef1f6',
      'text-rotation':'none', 'text-background-color':'#11141a',
      'text-background-opacity':0.92, 'text-background-padding':4,
      'text-background-shape':'round-rectangle', 'text-opacity':0.9,
      'transition-property':'line-color, target-arrow-color, opacity, text-opacity',
      'transition-duration':'180ms',
    }},
    // Hovered edge gets a fully opaque, larger label to read on a dense graph.
    {selector:'edge.hovered', style:{
      'text-opacity':1, 'font-size':11, 'text-background-opacity':1, 'z-index':30,
      'line-color':'#5eead4', 'target-arrow-color':'#5eead4',
    }},
    {selector:'edge[kind = "wf-edge"]', style:{
      'line-style':'dashed', 'line-color':'#f87171', 'target-arrow-color':'#f87171'
    }},
    // Edges sharing a node pair: bundled bezier fans them onto distinct arcs
    // (control-point-step-size spaces the fan); autorotate sits each label on
    // its own arc, and full-opacity backgrounds keep them legible where close.
    {selector:'edge.parallel', style:{
      'curve-style':'bezier', 'control-point-step-size':38,
      'text-rotation':'autorotate', 'text-background-opacity':1,
    }},
    {selector:'edge.dim', style:{'opacity':0.1}},
    {selector:'edge.highlight', style:{'line-color':'#5eead4','target-arrow-color':'#5eead4',
                                       'width':3, 'opacity':1}},
    // Active edge selection: brighter, thicker, with a teal glow — the edge
    // counterpart to a node's selected border, so it's clear which edge drives
    // the side panel.
    {selector:'edge.sel', style:{
      'line-color':'#5eead4', 'target-arrow-color':'#5eead4', 'width':4.5, 'opacity':1,
      'z-index':45, 'underlay-color':'#5eead4', 'underlay-opacity':0.3,
      'underlay-padding':6, 'underlay-shape':'round-rectangle',
      'text-opacity':1, 'text-background-opacity':1, 'font-size':11, 'color':'#ffffff',
    }},
    // search result tiers
    {selector:'node.m-match', style:{
      'background-blacken':-0.3, 'border-color':'#5eead4', 'border-width':4,
      'width': ele => baseW(ele)*1.35, 'height': ele => baseH(ele)*1.35,
      'font-size':13, 'font-weight':700, 'color':'#ffffff', 'z-index':40,
      'underlay-color':'#5eead4', 'underlay-opacity':0.5, 'underlay-padding':14,
      'underlay-shape':'round-rectangle',
    }},
    {selector:'node.m-hop1', style:{
      'border-color':'#2f6f68', 'border-width':2.5, 'z-index':20,
    }},
    {selector:'node.m-hop2', style:{'opacity':0.4}},
    {selector:'node.m-dim', style:{'opacity':0.07}},
    {selector:'edge.m-edge1', style:{
      'line-color':'#5eead4', 'target-arrow-color':'#5eead4', 'width':3, 'opacity':1, 'z-index':20}},
    {selector:'edge.m-edge2', style:{'opacity':0.3}},
    {selector:'edge.m-dim', style:{'opacity':0.04}},
    // transient flash for the form connected to a selected relationship field
    {selector:'node.pulse', style:{
      'opacity':1, 'border-color':'#fde68a', 'border-width':5, 'z-index':50,
      'underlay-color':'#fde68a', 'underlay-opacity':0.55, 'underlay-padding':16,
      'underlay-shape':'round-rectangle',
    }},
  ],
  layout: INITIAL,
  wheelSensitivity: 0.2,
  minZoom: 0.2, maxZoom: 3,
});

cy.ready(() => { cy.fit(undefined, 60); selectFromHash(); });

// Deep link from the global explorer: #form=<name> opens with that form selected.
function selectFromHash(){
  const formName = new URLSearchParams(location.hash.slice(1)).get('form');
  if (!formName) return;
  const node = cy.$id(formName);
  if (node.empty()) return;
  node.emit('tap');
  cy.animate({center:{eles: node}}, {duration:400});
}

// Panel rendering
const panel = document.getElementById('panel');
let activeNodeId = null;
let activeFieldFilter = '';
let currentFormName = null;
let expandedFields = new Set();  // field names expanded inline; reset when the form changes

function clearHighlights(){
  cy.elements().removeClass('dim highlight m-match m-hop1 m-hop2 m-dim m-edge1 m-edge2 sel');
}

function renderEmpty(){
  panel.className = 'panel empty';
  panel.innerHTML = 'Click a node to inspect.<br>Scroll to zoom · drag to pan.';
  activeNodeId = null;
  clearHighlights();
}

function renderForm(formName){
  const f = DATA.forms.find(x => x.name === formName);
  if (!f) return;
  // Switching forms auto-collapses any inline detail from the previous form.
  currentFormName = formName;
  expandedFields = new Set();
  const fields = DATA.fields[formName] || [];
  const incomingRels = DATA.relationships.filter(r => r.target === formName);
  const outgoingRels = DATA.relationships.filter(r => r.source === formName);
  const wfsTouching = DATA.workflows.filter(w =>
    w.fieldUsage.some(u => u.form === formName) ||
    (w.trigger && w.trigger.form === formName) ||
    w.actions.some(a => a.targetForm === formName));
  const touchedFieldNames = new Set();
  wfsTouching.forEach(w => w.fieldUsage.filter(u => u.form === formName)
                                       .forEach(u => touchedFieldNames.add(u.field)));

  panel.className = 'panel';
  panel.innerHTML = `
    <button class="close-btn" onclick="renderEmpty()">×</button>
    <h2>${escapeHtml(f.name)}</h2>
    <span class="role ${f.role}">${f.role}</span>
    <div class="meta">
      ${f.subformOf ? `Embedded grid of <b>${escapeHtml(f.subformOf)}</b><br>` : ''}
      ${f.description ? `${escapeHtml(f.description)}<br>` : ''}
      <b>${f.fieldCount}</b> fields ·
      <b>${incomingRels.length}</b> incoming links ·
      <b>${outgoingRels.length}</b> outgoing links<br>
      <b>${wfsTouching.length}</b> workflow(s) touch this form
    </div>

    ${outgoingRels.length ? `<div class="section"><h3>Outgoing relationships</h3>
      ${outgoingRels.map(r => `<div class="usage" style="border-left-color:var(--accent)">
        ${escapeHtml(r.via)} → ${escapeHtml(r.target)}
        <div class="ctx">match field on target: ${escapeHtml(r.label||'(none)')}</div></div>`).join('')}
      </div>` : ''}

    ${incomingRels.length ? `<div class="section"><h3>Incoming relationships</h3>
      ${incomingRels.map(r => `<div class="usage">${escapeHtml(r.source)} → ${escapeHtml(r.via)}</div>`).join('')}
      </div>` : ''}

    ${wfsTouching.length ? `<div class="section"><h3>Workflows touching this form</h3>
      ${wfsTouching.map(w => `<div class="wf-card" onclick="cy.$('#WF:${w.callsign}').emit('tap')">
        <span class="cs">${escapeHtml(w.callsign)}</span>
        <div class="nm">${escapeHtml(w.name)}</div>
      </div>`).join('')}
      </div>` : ''}

    <div class="section">
      <h3>Fields (${fields.length})</h3>
      <input class="field-search" id="field-search" placeholder="filter fields..."
             value="${escapeHtml(activeFieldFilter)}">
      <div class="field-list" id="field-list"></div>
    </div>
  `;

  const searchEl = document.getElementById('field-search');
  if (searchEl) {
    searchEl.addEventListener('input', e => { activeFieldFilter = e.target.value; renderFieldList(formName); });
  }
  renderFieldList(formName);
}

// Fields matching the current filter; expansion state is tracked separately so a
// filter only changes what's visible, never what's expanded.
function visibleFields(formName){
  const q = activeFieldFilter.toLowerCase();
  return (DATA.fields[formName] || []).filter(f =>
    !q || f.name.toLowerCase().includes(q) || (f.label||'').toLowerCase().includes(q));
}

function renderFieldList(formName){
  const list = document.getElementById('field-list');
  if (!list) return;
  const touchedFieldNames = new Set();
  DATA.workflows.forEach(w => w.fieldUsage.filter(u => u.form === formName)
                                          .forEach(u => touchedFieldNames.add(u.field)));
  const visible = visibleFields(formName);

  const controls = `<div class="field-controls">
    <span class="exp-count" id="exp-count">${expandedFields.size} expanded</span>
    <span class="spacer"></span>
    <button class="mini-btn" onclick="collapseAllFields()">Collapse all</button>
    <button class="mini-btn" onclick="expandAllFields()">Expand all</button>
  </div>`;

  if (!visible.length) {
    list.innerHTML = controls + `<div class="empty-state">no fields match the filter</div>`;
    return;
  }

  list.innerHTML = controls + visible.map(f => {
    const touched = touchedFieldNames.has(f.name);
    const isExp = expandedFields.has(f.name);
    return `<div class="field-row" data-field="${escapeAttr(f.name)}">
      <div class="field ${touched?'touched':''} ${isExp?'expanded':''}"
           onclick="toggleField(this,'${escapeAttr(formName)}','${escapeAttr(f.name)}')">
        <span class="chev"></span>
        <span class="fname">${escapeHtml(f.name)}</span>
        <span class="ftype">${escapeHtml(f.type||'')}</span>
        <span class="flbl">${escapeHtml(f.label||'')}</span>
        <span class="badges">
          ${f.required==='Yes'?'<span class="badge req">REQ</span>':''}
          ${f.component==='FormRelationshipInput'?'<span class="badge rel">REL</span>':''}
          ${f.component==='FormRelationshipReferenceDataInput'?'<span class="badge ref">REF</span>':''}
        </span>
      </div>
      ${isExp ? `<div class="field-detail">${fieldDetailHTML(formName, f.name)}</div>` : ''}
    </div>`;
  }).join('');
}

function updateExpandCount(){
  const el = document.getElementById('exp-count');
  if (el) el.textContent = `${expandedFields.size} expanded`;
}

// Toggle one field's inline detail. Targeted DOM edit (not a full re-render) so the
// scroll position is preserved and only the toggled field's detail is built.
function toggleField(headerEl, formName, fieldName){
  const row = headerEl.closest('.field-row');
  if (expandedFields.has(fieldName)) {
    expandedFields.delete(fieldName);
    headerEl.classList.remove('expanded');
    const d = row.querySelector('.field-detail');
    if (d) d.remove();
  } else {
    expandedFields.add(fieldName);
    headerEl.classList.add('expanded');
    const d = document.createElement('div');
    d.className = 'field-detail';
    d.innerHTML = fieldDetailHTML(formName, fieldName);
    row.appendChild(d);
    pulseConnectedForm(formName, fieldName);
  }
  updateExpandCount();
}

function expandAllFields(){
  if (!currentFormName) return;
  const visible = visibleFields(currentFormName);
  const toOpen = visible.filter(f => !expandedFields.has(f.name));
  if (!toOpen.length) return;
  if (toOpen.length > 20 &&
      !confirm(`Expand all ${toOpen.length} fields? This may take a moment on a large form.`)) {
    return;
  }
  visible.forEach(f => expandedFields.add(f.name));
  renderFieldList(currentFormName);
}

function collapseAllFields(){
  expandedFields.clear();
  if (currentFormName) renderFieldList(currentFormName);
}

// Flash the connected form when a relationship field is expanded.
function pulseConnectedForm(formName, fieldName){
  const field = (DATA.fields[formName]||[]).find(f => f.name === fieldName);
  if (!field) return;
  let cf = null;
  if (field.component === 'FormRelationshipInput') cf = field.relatedForm || null;
  else if (field.component === 'FormRelationshipReferenceDataInput') cf = relationshipTarget(formName, field.via);
  if (cf) { const cn = cy.$id(cf); if (cn.nonempty()) cn.flashClass('pulse', 1300); }
}

// Resolve the form on the far end of one of formName's relationship fields.
function relationshipTarget(formName, via){
  const rel = DATA.relationships.find(r => r.source === formName && r.via === via);
  return rel ? rel.target : null;
}

// Inner HTML for a field's inline detail block (no DOM side effects).
function fieldDetailHTML(formName, fieldName){
  const field = (DATA.fields[formName]||[]).find(f => f.name === fieldName);
  if (!field) return '';

  const usages = [];
  DATA.workflows.forEach(w => w.fieldUsage.forEach(u => {
    if (u.form === formName && u.field === fieldName) usages.push({wf:w, usage:u});
  }));

  // Reverse direction: forms that pull this field in via a ReferenceDataInput.
  // A refPull {destForm, via, sourceField} pulls sourceField from the form that
  // destForm reaches through relationship `via`; match that resolved form + field.
  const referencedBy = [];
  DATA.refPulls.forEach(r => {
    if (r.sourceField !== fieldName) return;
    if (relationshipTarget(r.destForm, r.via) === formName) {
      referencedBy.push({form: r.destForm, via: r.via, localField: r.destField});
    }
  });

  // Intra-form reverse: other fields on this form whose config depends on this field.
  const KIND_PHRASE = {
    validation: f => `Validation / required rule on ${f}`,
    formula:    f => `Formula for computed field ${f}`,
    filter:     f => `Filter condition on ${f}`,
    visibility: f => `Visibility condition on ${f}`,
  };
  const KIND_BADGE = {validation:'REQ', formula:'FX', filter:'FILTER', visibility:'VISIBLE'};
  const intraRefs = [];
  (DATA.fields[formName] || []).forEach(g => {
    const dep = g.dependsOn || {};
    Object.keys(KIND_PHRASE).forEach(kind => {
      if ((dep[kind] || []).includes(fieldName)) intraRefs.push({by: g.name, kind});
    });
  });

  return `
    <div class="meta">
      <b>Label:</b> ${escapeHtml(field.label||'(none)')}<br>
      <b>Type:</b> ${escapeHtml(field.type||'')}<br>
      <b>Component:</b> ${escapeHtml(field.component||'')}<br>
      ${field.relatedForm?`<b>Linked to:</b> ${escapeHtml(field.relatedForm)}<br>`:''}
      ${field.relatedField?`<b>Pulls field:</b> ${escapeHtml(field.relatedField)}<br>`:''}
      ${field.via?`<b>Via relationship:</b> ${escapeHtml(field.via)}<br>`:''}
      ${field.defaultValue?`<b>Default:</b> ${escapeHtml(field.defaultValue)}<br>`:''}
      ${field.validator?`<b>Validator:</b> ${escapeHtml(field.validator)}<br>`:''}
    </div>

    ${field.formula?`<h3>Formula</h3>
      <div class="usage" style="font-family:monospace;white-space:pre-wrap;line-height:1.4">${escapeHtml(field.formula)}</div>`:''}

    ${usages.length?
      `<h3>Workflow usage (${usages.length})</h3>
       ${usages.map(({wf,usage}) => `<div class="usage ${usage.direction}">
         <span class="dir">${usage.direction}</span>${escapeHtml(wf.callsign)}
         <div class="ctx">${escapeHtml(usage.context)}</div>
       </div>`).join('')}`
      :'<div class="empty-state">no workflows touch this field yet</div>'}

    <h3>Referenced by (${referencedBy.length})</h3>
    ${referencedBy.length?
      referencedBy.map(x => `<div class="usage Match">
        <span class="dir">REF</span>${escapeHtml(x.form)}
        <div class="ctx">via ${escapeHtml(x.via)} → ${escapeHtml(x.localField)}</div>
      </div>`).join('')
      :'<div class="empty-state">no forms reference this field</div>'}

    <h3>Used within this form (${intraRefs.length})</h3>
    ${intraRefs.length?
      intraRefs.map(x => `<div class="usage Condition">
        <span class="dir">${KIND_BADGE[x.kind]}</span>${escapeHtml(x.by)}
        <div class="ctx">${escapeHtml(KIND_PHRASE[x.kind](x.by))}</div>
      </div>`).join('')
      :'<div class="empty-state">not referenced by other fields on this form</div>'}
  `;
}

function renderWorkflow(callsign){
  const w = DATA.workflows.find(x => x.callsign === callsign);
  if (!w) return;
  panel.className = 'panel';
  panel.innerHTML = `
    <button class="close-btn" onclick="renderEmpty()">×</button>
    <h2>${escapeHtml(w.name)}</h2>
    <span class="role Workflow">Workflow · ${escapeHtml(w.callsign)}</span>${
      w.enabled === false ? '<span class="badge off">Disabled</span>' : ''}

    <div class="section"><h3>Trigger</h3>
      <div class="usage Condition">
        <span class="dir">${escapeHtml(w.trigger.type.split(' · ')[0])}</span>${escapeHtml(w.trigger.form)}
        <div class="ctx">${escapeHtml(w.trigger.condition)}</div>
      </div>
    </div>

    <div class="section"><h3>Actions</h3>
      ${w.actions.map(a => `<div class="wf-card">
        <div class="nm">${escapeHtml(a.name)}</div>
        <div class="cs">${escapeHtml(a.type)}</div>
        <div class="desc">target: ${escapeHtml(a.targetForm)}<br>
        dup policy: ${escapeHtml(a.duplicatePolicy)} · match: ${escapeHtml(a.matchOn||'(none)')}</div>
      </div>`).join('')}
    </div>

    <div class="section"><h3>Field usage (${w.fieldUsage.length})</h3>
      ${w.fieldUsage.map(u => `<div class="usage ${u.direction}">
        <span class="dir">${u.direction}</span>${escapeHtml(u.form)} · ${escapeHtml(u.field)}
        <div class="ctx">${escapeHtml(u.context)}</div>
      </div>`).join('')}
    </div>
  `;
  highlightWorkflow(w);
}

function highlightWorkflow(w){
  clearHighlights();
  cy.elements().addClass('dim');
  const touched = new Set();
  touched.add('WF:'+w.callsign);
  if (w.trigger && w.trigger.form) touched.add(w.trigger.form);
  w.actions.forEach(a => a.targetForm && touched.add(a.targetForm));
  touched.forEach(id => {
    const n = cy.$id(id);
    n.removeClass('dim').addClass('highlight');
    n.connectedEdges().forEach(e => {
      if (touched.has(e.source().id()) && touched.has(e.target().id())) {
        e.removeClass('dim').addClass('highlight');
      }
    });
  });
}

// Edge-detail view — the third side-panel category alongside form-detail and
// field-detail. Renders every individual relationship carried by the edge even
// when its graph label is an aggregate count.
function renderEdge(e){
  const src = e.data('source'), tgt = e.data('target');
  const rels = e.data('rels') || [];
  const pulls = e.data('pulls') || 0;
  const count = `${rels.length} relationship${rels.length===1?'':'s'}` +
                (pulls ? ` · ${pulls} pull${pulls===1?'':'s'}` : '');
  panel.className = 'panel';
  panel.innerHTML = `
    <button class="close-btn" onclick="renderEmpty()">×</button>
    <h2>Relationships from ${escapeHtml(src)} to ${escapeHtml(tgt)}</h2>
    <div class="meta">${count}</div>

    <div class="section"><h3>Relationships (${rels.length})</h3>
      ${rels.map(r => `<div class="usage Match">
        <span class="dir">REL</span>${escapeHtml(r.name)}
        <div class="ctx">via field: ${escapeHtml(r.via)}` +
          `${r.match ? ` · matches on: ${escapeHtml(r.match)}` : ''}` +
          `${r.pulls ? ` · ${r.pulls} pull${r.pulls===1?'':'s'}` : ''}</div>
      </div>`).join('')}
    </div>

    <div class="section"><h3>Navigate</h3>
      <button class="mini-btn" style="margin-right:6px" onclick="cy.$id('${escapeAttr(src)}').emit('tap')">View source form</button>
      <button class="mini-btn" onclick="cy.$id('${escapeAttr(tgt)}').emit('tap')">View target form</button>
    </div>
  `;
}

// Visual feedback for the active edge: dim the rest, glow the edge, lift its endpoints.
function selectEdgeVisual(e){
  clearHighlights();           // also drops any prior edge 'sel'
  cy.elements().addClass('dim');
  e.removeClass('dim').addClass('sel');
  e.connectedNodes().removeClass('dim').addClass('highlight');
}

cy.on('tap', 'node', evt => {
  const n = evt.target;
  activeNodeId = n.id();
  activeFieldFilter = '';
  if (n.data('kind') === 'workflow') {
    renderWorkflow(n.data('wfRef'));
  } else {
    clearHighlights();
    cy.elements().addClass('dim');
    n.removeClass('dim').addClass('highlight');
    n.connectedEdges().forEach(e => {
      e.removeClass('dim').addClass('highlight');
      e.connectedNodes().removeClass('dim');
    });
    renderForm(n.id());
  }
});

cy.on('tap', 'edge', evt => {
  const e = evt.target;
  // Workflow edges (trigger/action arrows) stay non-interactive: the workflow
  // node already opens full workflow detail, so its arrows carry only direction.
  // Edge-detail is for relationship edges, where the aggregate label hides the
  // individual relationships a click should reveal.
  if (e.data('kind') !== 'relationship') return;
  activeNodeId = null;
  activeFieldFilter = '';
  selectEdgeVisual(e);
  renderEdge(e);
});

cy.on('tap', evt => {
  if (evt.target === cy) { renderEmpty(); }
});

cy.on('mouseover', 'edge', e => e.target.addClass('hovered'));
cy.on('mouseout', 'edge', e => e.target.removeClass('hovered'));

// Toolbar wiring
document.getElementById('layout').addEventListener('change', e => {
  const name = e.target.value;
  if (name === 'preset') {
    cy.layout(hasPreset ? {name:'preset', positions: PRESET, fit:true, padding:60} : FORCE).run();
  } else if (name === 'cose') {
    cy.layout(FORCE).run();
  } else {
    cy.layout({name, fit:true, padding:60, animate:true}).run();
  }
});
document.getElementById('fit').addEventListener('click', () => cy.fit(undefined, 60));
document.getElementById('reset').addEventListener('click', () => {
  cy.layout(INITIAL).run();
  renderEmpty();
});

// Light/dark toggle. The head script already applied the saved theme; here we
// sync the button label and persist on change. Default dark.
const themeBtn = document.getElementById('theme-toggle');
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('explorer-theme', t); } catch (e) {}
  themeBtn.textContent = t === 'dark' ? 'Light mode' : 'Dark mode';
  // Role colors are resolved from CSS vars, which differ per theme — re-resolve
  // and re-apply to the (canvas-rendered) nodes since they can't track var() live.
  ROLE_COLOR = roleColors();
  if (typeof cy !== 'undefined') {
    cy.nodes().forEach(n => n.style('background-color', ROLE_COLOR[n.data('role')] || '#888'));
  }
}
let savedTheme = 'dark';
try { savedTheme = localStorage.getItem('explorer-theme') || 'dark'; } catch (e) {}
setTheme(savedTheme);
themeBtn.addEventListener('click', () =>
  setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

const matchCount = document.getElementById('match-count');
const plural = (n, w) => `${n} ${w}${n === 1 ? '' : 's'}`;

function workflowMatches(w, q){
  if (w.callsign.toLowerCase().includes(q) || (w.name||'').toLowerCase().includes(q)) return true;
  if (w.trigger) {
    if ((w.trigger.condition||'').toLowerCase().includes(q)) return true;
    if ((w.trigger.type||'').toLowerCase().includes(q)) return true;
  }
  return w.actions.some(a => (a.type||'').toLowerCase().includes(q));
}

function runSearch(raw){
  const q = raw.toLowerCase().trim();
  clearHighlights();
  if (!q) {
    matchCount.textContent = '';
    cy.animate({fit:{eles: cy.elements(), padding:60}}, {duration:250});
    return;
  }

  let formCount = 0, fieldCount = 0, wfCount = 0;
  const matches = cy.collection();
  DATA.forms.forEach(f => {
    const nameHit = f.name.toLowerCase().includes(q);
    if (nameHit) formCount++;
    const hits = (DATA.fields[f.name] || []).filter(x =>
      x.name.toLowerCase().includes(q) || (x.label||'').toLowerCase().includes(q));
    fieldCount += hits.length;
    if (nameHit || hits.length) matches.merge(cy.$id(f.name));
  });
  DATA.workflows.forEach(w => {
    if (workflowMatches(w, q)) { wfCount++; matches.merge(cy.$id('WF:'+w.callsign)); }
  });

  matchCount.textContent =
    `${raw.trim()} — ${plural(formCount,'form')}, ${plural(fieldCount,'field')}, ${plural(wfCount,'workflow')} match`;

  // Tier nodes by hop distance from the match set.
  const hop1 = matches.neighborhood().nodes().difference(matches);
  const hop2 = hop1.neighborhood().nodes().difference(matches).difference(hop1);
  cy.elements().addClass('m-dim');
  matches.removeClass('m-dim').addClass('m-match');
  hop1.removeClass('m-dim').addClass('m-hop1');
  hop2.removeClass('m-dim').addClass('m-hop2');

  // Tier edges by the tier of the nodes they connect.
  const tier1 = new Set(matches.union(hop1).map(n => n.id()));
  const tier2 = new Set(matches.union(hop1).union(hop2).map(n => n.id()));
  cy.edges().forEach(ed => {
    const s = ed.source().id(), t = ed.target().id();
    if (tier1.has(s) && tier1.has(t)) ed.removeClass('m-dim').addClass('m-edge1');
    else if (tier2.has(s) && tier2.has(t)) ed.removeClass('m-dim').addClass('m-edge2');
  });

  if (matches.nonempty()) {
    cy.animate({fit:{eles: matches, padding:90}}, {duration:350, easing:'ease-out'});
  }
}

document.getElementById('search').addEventListener('input', e => runSearch(e.target.value));

// Helpers
function escapeHtml(s){return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function escapeAttr(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
window.renderEmpty = renderEmpty;
window.toggleField = toggleField;
window.expandAllFields = expandAllFields;
window.collapseAllFields = collapseAllFields;
window.cy = cy;
</script>
</body>
</html>
