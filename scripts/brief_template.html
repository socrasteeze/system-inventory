<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>__TITLE__</title>
<style>
  :root{--bg:#0f1115;--bg2:#1a1d24;--bg3:#252932;--border:#2e3340;
        --text:#e8ebf0;--muted:#8a92a3;--accent:#5eead4;
        --read:#60a5fa;--write:#f87171;--match:#a78bfa;--cond:#fbbf24;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:var(--bg);color:var(--text);min-height:100%}
  body{max-width:820px;margin:0 auto;padding:48px 28px 80px}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .back{font-size:12px}
  h1{font-size:24px;font-weight:600;margin:14px 0 4px}
  .badges{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .badge{font-size:11px;padding:2px 9px;border-radius:4px;background:var(--bg3);color:var(--muted)}
  .badge.Hub{background:#3b2d63;color:#d9c9ff}
  .badge.Spoke{background:#1e3a5f;color:#bcdbff}
  .badge.Lookup{background:#523a14;color:#ffe0a3}
  .badge.Subform{background:#323b47;color:#c8d2de}
  .badge.featured{background:#4a3a12;color:#fcd34d}
  .lead{font-size:14px;line-height:1.6;color:var(--text);margin:14px 0 6px}
  .lead .muted{color:var(--muted)}
  .ws{color:var(--muted);font-size:12px}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);
     margin:34px 0 12px;border-bottom:1px solid var(--border);padding-bottom:6px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
  td.field{font-weight:600;white-space:nowrap}
  .chip{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;margin-right:6px;
        color:#0f1115;font-weight:700}
  .chip.visibility{background:var(--cond)}
  .chip.formula{background:var(--write)}
  .chip.validation{background:var(--match)}
  .chip.filter{background:var(--read)}
  .chip.flow{background:#9fae5a}
  .effect{margin-bottom:4px}
  .effect:last-child{margin-bottom:0}
  ul{list-style:none}
  li{padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
  li .when{color:var(--muted);font-size:12px}
  .empty{color:var(--muted);font-style:italic;font-size:13px}
  .foot{color:var(--muted);font-size:11px;font-family:monospace;margin-top:40px}
  @media print{
    :root{--bg:#fff;--bg2:#fff;--bg3:#eee;--border:#ccc;--text:#111;--muted:#555}
    body{max-width:none;padding:0}
    .back{display:none}
    a{color:#111}
    th,td{padding:5px 8px}
    .chip{color:#fff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>
__BODY__
</body>
</html>
