// Keyboard navigation for the field list. Delegates on panel (static) since #field-list
// is rebuilt on every renderFieldList call. Roving-tabindex pattern: exactly one
// .field-row carries tabindex="0" at any time; arrows move within the list.
panel.addEventListener('keydown', e => {
  if (!e.target.classList.contains('field-row')) return;
  const list = document.getElementById('field-list');
  if (!list) return;
  const rows = Array.from(list.querySelectorAll('.field-row'));
  const idx = rows.indexOf(e.target);
  if (idx === -1) return;
  const fieldName = e.target.dataset.field;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (idx < rows.length - 1) setRovingRow(rows[idx + 1]);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (idx > 0) setRovingRow(rows[idx - 1]);
  } else if (e.key === 'Home') {
    e.preventDefault();
    setRovingRow(rows[0]);
  } else if (e.key === 'End') {
    e.preventDefault();
    setRovingRow(rows[rows.length - 1]);
  } else if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    const fieldEl = e.target.querySelector('.field');
    if (fieldEl && currentFormName) toggleField(fieldEl, currentFormName, fieldName);
  } else if (e.key === 'Escape') {
    e.preventDefault();
    if (expandedFields.has(fieldName)) {
      const fieldEl = e.target.querySelector('.field');
      if (fieldEl && currentFormName) toggleField(fieldEl, currentFormName, fieldName);
    } else {
      const searchEl = document.getElementById('field-search');
      if (searchEl) searchEl.focus();
    }
  }
});

// Helpers
function escapeHtml(s){return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function escapeAttr(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
// Mirrors regenerate.py's _brief_filename(): strip characters illegal in a
// Windows filename, but leave everything else (spaces, parens, #, etc.)
// unescaped so the href matches the literal filename on disk. Do NOT
// encodeURIComponent this — the file was saved with the plain name, and a
// browser resolving a percent-encoded href decodes it before the filesystem
// lookup, so encoding here would look for a filename that doesn't exist.
function briefFilename(formName){return String(formName).replace(/[<>:"/\\|?*]/g, '');}
window.renderEmpty = renderEmpty;
window.toggleField = toggleField;
window.expandAllFields = expandAllFields;
window.collapseAllFields = collapseAllFields;
window.clearFieldFilter = clearFieldFilter;
window.copyFieldName = copyFieldName;
window.togglePin = togglePin;
window.exportFormMarkdown = exportFormMarkdown;
window.toggleFilterMenu = toggleFilterMenu;
window.toggleFilterLock = toggleFilterLock;
window.setRovingRow = setRovingRow;
window.cy = cy;

// Panel resize — drag the handle between graph and panel. Width is clamped and
// persisted so the panel can never shrink to nothing or get clipped off-window.
(function initPanelResize(){
  const resizer = document.getElementById('resizer');
  const MIN_PANEL = 260, MAX_MARGIN = 320; // keep at least MAX_MARGIN px for the graph
  const STORAGE_KEY = 'inventory-panel-width';

  function clamp(px){
    const maxPanel = Math.max(MIN_PANEL, window.innerWidth - MAX_MARGIN);
    return Math.min(Math.max(px, MIN_PANEL), maxPanel);
  }
  // targetWidth is the single source of truth for the panel's intended size.
  // The resize handler re-clamps THIS, never the rendered DOM box — measuring
  // getBoundingClientRect() and feeding it back into setWidth on every resize
  // event creates a feedback loop (toggling DevTools repeatedly ratchets the
  // panel down to nothing via compounding rounding/timing drift).
  let targetWidth = 380;
  let dragging = false;
  function setWidth(px){
    targetWidth = clamp(px);
    // Graph column is minmax(0, 1fr) so it can shrink below its content's
    // intrinsic width (the Cytoscape canvas) without overflowing/clipping;
    // the panel is a bare fixed length so it's honored exactly. Putting the
    // minmax on the panel instead lets the greedy 1fr graph swallow the space
    // and the panel never actually grows.
    document.body.style.gridTemplateColumns = 'minmax(0, 1fr) 6px ' + targetWidth + 'px';
  }
  // Tracking-prevention browsers (Edge/Chrome on file:// pages) can block
  // localStorage entirely and throw — if that happens on this first call, it
  // would abort the whole IIFE below it, silently killing every drag listener.
  let saved = NaN;
  try { saved = parseInt(localStorage.getItem(STORAGE_KEY), 10); } catch(e) {}
  setWidth(!isNaN(saved) ? saved : targetWidth);

  resizer.addEventListener('pointerdown', e => {
    dragging = true;
    resizer.classList.add('active');
    document.body.classList.add('resizing');
    e.preventDefault();
  });
  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    setWidth(window.innerWidth - e.clientX);
  });
  function endDrag(){
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('active');
    document.body.classList.remove('resizing');
    try { localStorage.setItem(STORAGE_KEY, Math.round(targetWidth)); } catch(e) {}
    if (window.cy) window.cy.resize();
  }
  window.addEventListener('pointerup', endDrag);
  window.addEventListener('pointercancel', endDrag);
  // Re-clamp the intended width on window resize so the panel never gets
  // pushed off-screen — but never re-derive it from the rendered box.
  window.addEventListener('resize', () => {
    setWidth(targetWidth);
    if (window.cy) window.cy.resize();
  });
})();
</script>
