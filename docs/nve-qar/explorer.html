<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Qualified Appliance Replacement · Interactive Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.2/cytoscape.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
<style>
  :root {
    --bg:#0f1115; --bg2:#1a1d24; --bg3:#252932; --border:#2e3340;
    --text:#e8ebf0; --muted:#8a92a3; --accent:#5eead4;
    --hub:#a78bfa; --spoke:#60a5fa; --lookup:#fbbf24; --wf:#f87171; --subform:#7d8a9c;
    --wf-legacy:#f87171; --wf-engine:#9fae5a;
    --read:#60a5fa; --write:#f87171; --match:#a78bfa; --cond:#fbbf24;
    --overlay:rgba(26,29,36,0.92);
  }
  /* Light theme has its own background/text set and a deeper role palette:
     the dark-theme pastels wash out on a light backdrop, so light mode uses
     saturated 600-weight colors that hold contrast (and keep white node text legible). */
  :root[data-theme="light"] {
    --bg:#f6f7f9; --bg2:#ffffff; --bg3:#eceff3; --border:#d3d8e0;
    --text:#1a1d24; --muted:#5b6472; --accent:#0d9488;
    --hub:#7c3aed; --spoke:#2563eb; --lookup:#d97706; --wf:#dc2626; --subform:#64748b;
    --wf-legacy:#dc2626; --wf-engine:#9fae5a;
    --read:#2563eb; --write:#dc2626; --match:#7c3aed; --cond:#d97706;
    --overlay:rgba(255,255,255,0.92);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:var(--bg);color:var(--text);overflow:hidden}
  body{display:grid;grid-template-rows:auto 1fr;grid-template-columns:minmax(0, 1fr) 6px 380px;
       grid-template-areas:"toolbar toolbar toolbar" "graph resizer panel"}
  body.resizing{cursor:col-resize;user-select:none}
  body.resizing #cy{pointer-events:none}
  /* toolbar */
  .toolbar{grid-area:toolbar;background:var(--bg2);border-bottom:1px solid var(--border);
           padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .toolbar h1{font-size:14px;font-weight:600;letter-spacing:0.3px}
  .toolbar h1 .sub{color:var(--muted);font-weight:400;margin-left:8px;font-size:12px}
  .toolbar .spacer{flex:1}
  .toolbar input,.toolbar select,.toolbar button{
    background:var(--bg3);color:var(--text);border:1px solid var(--border);
    padding:6px 10px;border-radius:5px;font-size:12px;font-family:inherit;outline:none}
  .toolbar input{width:200px}
  .toolbar input:focus{border-color:var(--accent)}
  .toolbar button{cursor:pointer;transition:all 0.15s}
  .toolbar button:hover{background:var(--border);border-color:var(--accent)}
  .toolbar .stats{color:var(--muted);font-size:11px;font-family:monospace}
  .toolbar .match-count{color:var(--accent);font-size:11px;font-family:monospace;
    white-space:nowrap;min-width:0}
  .toolbar .match-count:empty{display:none}
  /* graph */
  #cy{grid-area:graph;background:var(--bg);position:relative}
  .legend{position:absolute;bottom:12px;left:12px;background:var(--overlay);
          border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:11px;
          display:flex;gap:14px;flex-wrap:wrap;backdrop-filter:blur(6px)}
  .legend .item{display:flex;align-items:center;gap:6px}
  .legend .dot{width:10px;height:10px;border-radius:50%}
  /* resize handle between graph and panel */
  .resizer{grid-area:resizer;background:var(--border);cursor:col-resize;position:relative}
  .resizer::after{content:'';position:absolute;top:0;bottom:0;left:-3px;right:-3px}
  .resizer:hover,.resizer.active{background:var(--accent)}
  /* side panel */
  .panel{grid-area:panel;background:var(--bg2);border-left:1px solid var(--border);
         overflow-y:auto;overflow-x:hidden;padding:18px;min-width:0;
         overflow-wrap:break-word;word-break:break-word}
  .panel.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);
               font-size:13px;text-align:center;padding:40px}
  .panel h2{font-size:16px;font-weight:600;margin-bottom:4px}
  .panel .role{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;
               text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px;font-weight:600}
  .role.Hub{background:#3b2d63;color:#d9c9ff}
  .role.Spoke{background:#1e3a5f;color:#bcdbff}
  .role.Lookup{background:#523a14;color:#ffe0a3}
  .role.Workflow{background:#5f2424;color:#ffc4c4}
  .role.Subform{background:#323b47;color:#c8d2de}
  .badge.off{background:#5f2424;color:#ffc4c4;font-size:10px;padding:2px 8px;
             border-radius:4px;text-transform:uppercase;letter-spacing:0.5px;
             font-weight:600;margin-left:6px;vertical-align:top}
  .panel .meta{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5}
  .panel .meta b{color:var(--text);font-weight:600}
  .panel .section{margin-top:18px;border-top:1px solid var(--border);padding-top:14px}
  .panel .section h3{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;
                     color:var(--muted);margin-bottom:10px}
  .panel input.field-search,.panel select.field-search{width:100%;background:var(--bg3);color:var(--text);
      border:1px solid var(--border);padding:6px 10px;border-radius:5px;font-size:12px;
      outline:none;margin-bottom:8px;font-family:inherit}
  .panel input.field-search:focus,.panel select.field-search:focus{border-color:var(--accent)}
  .panel select.field-search option{background:var(--bg3);color:var(--text)}
  .field-list{max-height:none}
  .field{padding:6px 8px;border-radius:4px;font-size:12px;cursor:pointer;
         border-left:2px solid transparent;transition:all 0.1s;font-family:monospace}
  .field:hover{background:var(--bg3)}
  .field.touched{border-left-color:var(--accent);background:rgba(94,234,212,0.06)}
  .field .fname{color:var(--text)}
  .field .flbl{color:var(--muted);font-size:10px;margin-left:6px;font-family:inherit}
  .field .ftype{color:var(--accent);font-size:10px;float:right;font-family:monospace}
  .field .badges{display:inline-flex;gap:4px;margin-left:6px}
  .field .chev{display:inline-block;width:0;height:0;margin-right:7px;vertical-align:middle;
         border-left:5px solid var(--muted);border-top:4px solid transparent;
         border-bottom:4px solid transparent;transition:transform 0.12s}
  .field.expanded .chev{transform:rotate(90deg);border-left-color:var(--accent)}
  .field-controls{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;
         background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 2px;margin-bottom:6px}
  .field-controls .exp-count{font-size:11px;color:var(--muted);font-family:monospace}
  .field-controls .spacer{flex:1}
  .mini-btn{background:var(--bg3);color:var(--text);border:1px solid var(--border);
         padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit}
  .mini-btn:hover{border-color:var(--accent)}
  .mini-btn.active{border-color:var(--accent);color:var(--accent)}
  .copy-btn{display:inline-flex;align-items:center;vertical-align:middle;
    width:15px;height:15px;border:0;background:transparent;color:var(--muted);
    cursor:pointer;padding:0;border-radius:3px;opacity:0;transition:opacity 0.1s;
    margin-left:3px;font-size:11px;line-height:1;flex-shrink:0}
  .field:hover .copy-btn,.copy-btn:focus{opacity:1}
  .copy-btn:hover,.copy-btn.copied{color:var(--accent)}
  .field-detail{margin:2px 0 8px 12px;padding:6px 10px;border-left:2px solid var(--border);
         background:var(--bg);border-radius:0 5px 5px 0}
  .field-detail h3{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;
         color:var(--muted);margin:12px 0 8px}
  .field-detail h3:first-child{margin-top:2px}
  .badge{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bg3);
         color:var(--muted);font-family:inherit;letter-spacing:0.3px}
  .badge.rel{background:#3b2d63;color:#d9c9ff}
  .badge.ref{background:#1e3a5f;color:#bcdbff}
  .badge.req{background:#5f2424;color:#ffc4c4}
  .badge.dep-uses{background:#1e3d2f;color:#6ee7b7;cursor:default}
  .badge.dep-used{background:#2d3a1e;color:#bef264;cursor:default}
  .badge.featured{background:#4a3a12;color:#fcd34d}
  .badge.mode-advanced{background:#3b2d63;color:#d9c9ff;cursor:default}
  .badge.mode-conditional{background:#1e3a5f;color:#bcdbff;cursor:default}
  /* Plain-English narrative: prose in the muted meta style, plus a quiet link out. */
  .summary-prose{font-size:12px;line-height:1.55;color:var(--text)}
  .summary-prose .lead{font-weight:600}
  .summary-prose .muted{color:var(--muted)}
  /* Workflow story panel — "when it runs / what it does" prose card. */
  .wf-story-panel{font-size:12px;line-height:1.55;background:var(--bg);
              border:1px solid var(--border);border-radius:6px;padding:10px 12px}
  .wf-story-panel .story-when{margin-bottom:6px}
  .wf-story-panel .story-then{padding-left:14px;position:relative;color:var(--text)}
  .wf-story-panel .story-then::before{content:'\2192';position:absolute;left:0;color:var(--accent)}
  .wf-story-panel .story-off{margin-top:6px;color:#fbbf24;font-style:italic}
  /* Field-write conflict warning — a field this workflow writes that another
     workflow also writes (a real race: whichever runs last wins). */
  .wf-conflict-panel{font-size:12px;line-height:1.5;background:#3a2a12;
              border:1px solid #6b4a1a;border-radius:6px;padding:10px 12px;color:#fcd9a3}
  .wf-conflict-panel .cf-row{margin-bottom:6px}
  .wf-conflict-panel .cf-row:last-child{margin-bottom:0}
  .wf-conflict-panel .cf-field{font-family:monospace;color:#fde3b8}
  .wf-conflict-panel .cf-link{color:#fcd34d;text-decoration:underline;cursor:pointer}
  .wf-conflict-panel .cf-link:hover{color:#ffe9ad}
  .brief-link{display:inline-block;margin-top:8px;font-size:11px;color:var(--accent);
              text-decoration:none}
  .brief-link:hover{text-decoration:underline}
  /* "Field interactions" rollup — collapsed by default, zero clutter until opened. */
  details.interactions{margin-top:6px}
  details.interactions>summary{cursor:pointer;font-size:11px;color:var(--muted);
              list-style:none;user-select:none}
  details.interactions>summary::-webkit-details-marker{display:none}
  details.interactions>summary::before{content:'▸ ';color:var(--accent)}
  details.interactions[open]>summary::before{content:'▾ '}
  details.interactions>summary:hover{color:var(--accent)}
  details.interactions[open]>summary{color:var(--accent);margin-bottom:8px}
  .ix-row{font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);cursor:pointer}
  .ix-row:hover{color:var(--accent)}
  .ix-row .n{font-weight:500}
  .ix-row .c{color:var(--muted);font-size:10px}
  #mini-cy{width:100%;height:260px;margin-top:8px;border:1px solid var(--border);
           border-radius:6px;background:var(--bg)}
  .field-row:focus{outline:none}
  .field-row:focus>.field{border-left-color:var(--accent);background:rgba(94,234,212,0.12)}
  .wf-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;
           padding:10px 12px;margin-bottom:8px;font-size:12px;cursor:pointer}
  .wf-card:hover{border-color:var(--accent)}
  .wf-card .cs{font-family:monospace;color:var(--accent);font-size:11px}
  .wf-card .nm{font-weight:600;margin:2px 0}
  .wf-card .desc{color:var(--muted);font-size:11px;line-height:1.4}
  .usage{padding:6px 10px;border-radius:4px;font-size:11px;margin-bottom:6px;
         background:var(--bg3);border-left:3px solid var(--muted);font-family:monospace}
  .usage.Read{border-left-color:var(--read)}
  .usage.Write{border-left-color:var(--write)}
  .usage.Match{border-left-color:var(--match)}
  .usage.Condition{border-left-color:var(--cond)}
  .usage .dir{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;
              margin-right:6px;font-weight:600;text-transform:uppercase}
  .usage.Read .dir{background:var(--read);color:#0f1115}
  .usage.Write .dir{background:var(--write);color:#0f1115}
  .usage.Match .dir{background:var(--match);color:#0f1115}
  .usage.Condition .dir{background:var(--cond);color:#0f1115}
  .usage .ctx{color:var(--muted);font-size:10px;margin-top:3px;font-family:inherit}
  .close-btn{float:right;background:transparent;border:0;color:var(--muted);cursor:pointer;
             font-size:18px;line-height:1}
  .close-btn:hover{color:var(--text)}
  .pin-btn{float:right;background:transparent;border:1px solid var(--border);color:var(--muted);
           cursor:pointer;font-size:11px;line-height:1;padding:2px 7px;border-radius:3px;
           margin-right:6px;margin-top:1px;font-family:inherit;transition:all 0.12s}
  .pin-btn:hover{border-color:var(--accent);color:var(--text)}
  .pin-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(94,234,212,0.08)}
  .breadcrumb{font-size:10px;color:var(--muted);margin-bottom:8px;line-height:1.4;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bc-link{cursor:pointer}
  .bc-link:hover{color:var(--accent);text-decoration:underline}
  .bc-sep{margin:0 4px;opacity:0.45}
  .bc-current{color:var(--text)}
  .empty-state{color:var(--muted);font-size:11px;font-style:italic;padding:6px 0}
  /* field section/page group headers */
  .field-group-header{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;
    color:var(--muted);padding:10px 2px 4px;font-weight:600;display:flex;align-items:center;gap:6px}
  .field-groups .field-group:first-child .field-group-header{padding-top:2px}
  .field-group-count{background:var(--bg3);color:var(--muted);border-radius:10px;
    padding:0 5px;font-size:9px;letter-spacing:0;font-weight:600}
  /* workflow direction badges on touched fields */
  .badge.dir-read{background:var(--read);color:#0f1115}
  .badge.dir-write{background:var(--write);color:#0f1115}
  .badge.dir-condition{background:var(--cond);color:#0f1115}
  /* filter dropdown */
  .filter-wrap{position:relative}
  .filter-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;
    background:var(--bg2);border:1px solid var(--border);border-radius:6px;
    padding:8px 14px 12px;z-index:100;min-width:164px;
    box-shadow:0 4px 20px rgba(0,0,0,0.45)}
  .filter-menu.open{display:block}
  .filter-group-label{font-size:10px;text-transform:uppercase;letter-spacing:0.7px;
    color:var(--muted);padding:8px 0 2px;font-weight:600}
  .filter-group-label:first-child{padding-top:2px}
  .filter-menu label{display:flex;align-items:center;gap:7px;font-size:12px;
    padding:3px 0;cursor:pointer;white-space:nowrap}
  .filter-menu label:hover{color:var(--accent)}
  .filter-sep{border-top:1px solid var(--border);margin:7px 0 1px}
  .toolbar button.active{border-color:var(--accent);color:var(--accent)}
</style>
<script>
  // Apply the saved theme before first paint to avoid a flash. Default dark.
  try { document.documentElement.setAttribute('data-theme', localStorage.getItem('explorer-theme') || 'dark'); } catch (e) {}
</script>
</head>
<body>

<div class="toolbar">
  <h1>Qualified Appliance Replacement<span class="sub">interactive map · click any node</span></h1>
  <input id="search" placeholder="Search forms, fields, conditions, actions..." autocomplete="off">
  <span class="match-count" id="match-count"></span>
  <select id="layout">
    <option value="preset">Layout: Hub &amp; Spoke</option>
    <option value="cose">Layout: Force</option>
    <option value="circle">Layout: Circle</option>
    <option value="grid">Layout: Grid</option>
    <option value="breadthfirst">Layout: Hierarchy</option>
    <option value="dagre">Layout: Dagre</option>
  </select>
  <select id="field-display">
    <option value="name">Fields: Name</option>
    <option value="label">Fields: Label</option>
  </select>
  <select id="field-sort">
    <option value="original">Sort: Original</option>
    <option value="required-first">Sort: Required first</option>
    <option value="hidden-last">Sort: Hidden last</option>
    <option value="type-grouped">Sort: By type</option>
  </select>
  <button id="fit">Fit</button>
  <button id="reset">Reset</button>
  <button id="theme-toggle" title="Toggle light / dark">Light mode</button>
  <div class="filter-wrap" id="filter-wrap">
    <button id="filter-btn" onclick="toggleFilterMenu()">Filters ▾</button>
    <div class="filter-menu" id="filter-menu">
      <div class="filter-group-label">Workflows</div>
      <label><input type="checkbox" data-filter="wfLegacy"> Legacy</label>
      <label><input type="checkbox" data-filter="wfEngine"> WF Engine</label>
      <label><input type="checkbox" data-filter="wfDisabled"> Disabled</label>
      <div class="filter-group-label">Forms</div>
      <label><input type="checkbox" data-filter="subforms"> Subforms</label>
      <label><input type="checkbox" data-filter="lookups"> Lookups</label>
      <div class="filter-sep"></div>
      <label><input type="checkbox" data-filter="orphaned"> Orphaned</label>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="stats" id="stats"></div>
</div>

<div id="cy"></div>

<div class="legend">
  <div class="item"><div class="dot" style="background:var(--hub)"></div>Hub</div>
  <div class="item"><div class="dot" style="background:var(--spoke)"></div>Spoke</div>
  <div class="item"><div class="dot" style="background:var(--lookup)"></div>Lookup</div>
  <div class="item"><div class="dot" style="background:var(--subform)"></div>Subform</div>
  <div class="item"><div class="dot" style="background:var(--wf-legacy)"></div>Legacy WF (Prod)</div>
  <div class="item"><div class="dot" style="background:var(--wf-engine)"></div>WF Engine</div>
  <div class="item" style="color:var(--muted)">solid edge = relationship · dashed = workflow trigger/target · dimmed = disabled</div>
</div>

<div class="resizer" id="resizer" title="Drag to resize"></div>

<div class="panel empty" id="panel">
  Click a node to inspect.<br>Scroll to zoom · drag to pan.
</div>

const stats = document.getElementById('stats');
const refPullsByPair = {};  // pulls per source->target direction (drives the edge label)
const pullsByRel = {};      // pulls per individual relationship field (drives edge detail)
DATA.refPulls.forEach(r => {
  // resolve via -> target form using relationships
  const rel = DATA.relationships.find(x => x.source === r.destForm && x.via === r.via);
  if (rel) {
    refPullsByPair[r.destForm + '→' + rel.target] = (refPullsByPair[r.destForm + '→' + rel.target] || 0) + 1;
    pullsByRel[rel.source + '|' + rel.via] = (pullsByRel[rel.source + '|' + rel.via] || 0) + 1;
  }
});

stats.textContent = `${DATA.forms.length} forms · ${DATA.relationships.length} relationships · ${DATA.refPulls.length} ref-pulls · ${Object.values(DATA.fields).reduce((a,b)=>a+b.length,0)} fields · ${DATA.workflows.length} workflow`;

// Build cytoscape elements
const elements = [];
// Cytoscape renders nodes to a canvas, which can't resolve CSS var() strings —
// resolve the role colors to concrete hex from the active theme's computed styles,
// and recompute them when the theme changes (see setTheme).
const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim() || '#888';
function roleColors(){
  return {Hub:cssVar('--hub'), Spoke:cssVar('--spoke'), Lookup:cssVar('--lookup'),
          Subform:cssVar('--subform'), Workflow:cssVar('--wf'),
          WfLegacy:cssVar('--wf-legacy'), WfEngine:cssVar('--wf-engine')};
}
let ROLE_COLOR = roleColors();

DATA.forms.forEach(f => {
  elements.push({data:{id:f.name, label:f.name, role:f.role, fieldCount:f.fieldCount,
                       kind:'form', featured: f.featured ? 1 : 0},
                 classes: f.featured ? 'featured' : undefined});
});

// Workflow nodes. Disabled workflows are dimmed/dashed. Legacy (prod WF system)
// and WFEngine (staged replacement) get distinct red vs olive colors so the
// two systems are never visually confused.
DATA.workflows.forEach(w => {
  const off = w.enabled === false;
  const isLegacy = w.workflowType === 'Legacy';
  const typeTag = isLegacy ? '\n[Legacy]' : '\n[WF Engine]';
  elements.push({data:{
    id:'WF:'+w.callsign,
    label: w.callsign + (off ? '\n(off)' : '') + typeTag,
    role:'Workflow', kind:'workflow', wfRef:w.callsign,
    workflowType: w.workflowType || 'WFEngine',
    environment: w.environment || '',
  }, classes: off ? 'wf-off' : undefined});
});

// Relationship edges — one per direction. A direction can carry many
// relationship fields (e.g. 325 -> 399 links through 32 measure-code fields);
// rendering each as its own arc would be an unreadable fan, so they aggregate
// into a single edge whose label names the field (or the count when several).
// The genuinely distinct edges to separate are the two *directions* of a pair
// (A -> B and B -> A), which the parallel-fan pass below pulls onto split arcs.
const relByDir = {};
DATA.relationships.forEach(r => {
  if (!DATA.forms.find(f => f.name === r.target)) return; // skip if target not in our form list
  const k = r.source + '→' + r.target;
  (relByDir[k] = relByDir[k] || {source:r.source, target:r.target, rels:[]}).rels.push({
    name: r.label || r.via, via: r.via, match: r.targetMatchField || '',
    pulls: pullsByRel[r.source + '|' + r.via] || 0,
  });
});
Object.values(relByDir).forEach(e => {
  const pulls = e.rels.reduce((a, r) => a + r.pulls, 0);
  const base = e.rels.length === 1 ? e.rels[0].via : `${e.rels.length} relationships`;
  // Carry the full relationship list on the edge so an edge click can render
  // every individual relationship even when the label is an aggregate count.
  elements.push({data:{
    id: `rel::${e.source}::${e.target}`,
    source:e.source, target:e.target,
    label: pulls > 0 ? `${base} · ${pulls} pulls` : base,
    kind:'relationship', rels: e.rels, pulls,
  }});
});

// Workflow edges
DATA.workflows.forEach(w => {
  if (w.trigger && w.trigger.form) {
    elements.push({data:{source:w.trigger.form, target:'WF:'+w.callsign,
      label:'trigger', kind:'wf-edge', workflowType:w.workflowType}});
  }
  w.actions.forEach((a, i) => {
    if (a.targetForm) {
      elements.push({data:{source:'WF:'+w.callsign, target:a.targetForm,
        label:a.type.replace('BuiltIn.',''), kind:'wf-edge', workflowType:w.workflowType,
        actionIndex:i}});
    }
  });
});

// stylesheet, which auto-fans them along distinct arcs with their own labels.
(() => {
  const pairCount = {};
  const pairKey = e => [e.data.source, e.data.target].sort().join('');
  elements.forEach(e => {
    if (e.data.source && e.data.target) {
      const k = pairKey(e);
      pairCount[k] = (pairCount[k] || 0) + 1;
    }
  });
  elements.forEach(e => {
    if (e.data.source && e.data.target && pairCount[pairKey(e)] > 1) {
      e.classes = (e.classes ? e.classes + ' ' : '') + 'parallel';
    }
  });
})();

// Preset positions (hub-and-spoke layout), injected from the workspace's
// manual/explorer_layout.json. Empty when the workspace has no saved layout —

const PRESET = {};

               idealEdgeLength:120, gravity:0.5};

// Node width grows with field count (the bubble encoding) but never narrower than
// the label needs, capped at NODE_MAX_W; longer labels wrap to a second line.
const NODE_MAX_W = 144;
const baseW = ele => {
  if (ele.data('kind') === 'workflow') return 104;
  const byFields = 34 + Math.sqrt(ele.data('fieldCount') || 50) * 3.5;
  const byLabel  = Math.min(NODE_MAX_W, 26 + (ele.data('label') || '').length * 6.5);
  return Math.max(byFields, byLabel);
};
const baseH = ele => {
  if (ele.data('kind') === 'workflow') return 56;
  return Math.max(48, 34 + Math.sqrt(ele.data('fieldCount') || 50) * 3.5);
};

// Deep links: #form=<name> (from the global explorer) opens with that form
// selected; #wf=<callsign> opens with that workflow selected (bookmark/share).
function selectFromHash(){
  const params = new URLSearchParams(location.hash.slice(1));
  const formName = params.get('form');
  const wf = params.get('wf');
  const node = formName ? cy.$id(formName) : (wf ? cy.$id('WF:' + wf) : null);
  if (!node || node.empty()) return;
  node.emit('tap');
  cy.animate({center:{eles: node}}, {duration:400});
}

let activeNodeId = null;
let activeFieldFilter = '';
let activeModeFilter = '';       // '' | 'Advanced' | 'Conditional' -- config authoring mode
let currentFormName = null;
let expandedFields = new Set();  // field names expanded inline; reset when the form changes
let keyboardActiveField = null;  // roving-tabindex anchor; null = use first row
let pinnedForm = null;           // form name locked in the panel; null = unpinned
const formHistory = [];          // navigation trail, oldest first, max 5 entries
const formFieldState = {};       // saved per-form: {filter, expanded, keyboardField}
const FILTER_LOCK_KEY = 'explorer-filter-lock';
let lockFieldFilter = false;
try { lockFieldFilter = localStorage.getItem(FILTER_LOCK_KEY) === 'true'; } catch(e) {}

function clearHighlights(){
  cy.elements().removeClass('dim highlight m-match m-hop1 m-hop2 m-dim m-edge1 m-edge2 sel');

function renderEmpty(){
  pinnedForm = null;
  formHistory.length = 0;
  saveFormFieldState(currentFormName);
  currentFormName = null;
  panel.className = 'panel empty';
  panel.innerHTML = 'Click a node to inspect.<br>Scroll to zoom · drag to pan.';
  activeNodeId = null;

function renderForm(formName){
  const f = DATA.forms.find(x => x.name === formName);
  if (!f) return;
  saveFormFieldState(currentFormName);
  currentFormName = formName;

  // Navigation history: back-navigate truncates forward; new visit appends (max 5).
  const _hi = formHistory.indexOf(formName);
  if (_hi === formHistory.length - 1) { /* re-render of current form (e.g. togglePin) */ }
  else if (_hi !== -1) { formHistory.splice(_hi + 1); }
  else { formHistory.push(formName); if (formHistory.length > 5) formHistory.shift(); }

  const _saved = formFieldState[formName];
  if (_saved) {
    expandedFields = new Set(_saved.expanded);
    keyboardActiveField = _saved.keyboardField;
    activeFieldFilter = _saved.filter;
  } else {
    expandedFields = new Set();
    keyboardActiveField = null;
    if (!lockFieldFilter) activeFieldFilter = '';
  }
  const fields = DATA.fields[formName] || [];
  const nar = (DATA.narrative && DATA.narrative[formName]) || null;
  // Only fields that actually trigger something elsewhere (forward fields or a
  // workflow branch) appear in the interactions rollup — participants only.
  const ixFields = nar ? Object.keys(nar.forward).filter(fn =>
    nar.forward[fn].fields.length || nar.forward[fn].wfCondition.length) : [];
  const incomingRels = DATA.relationships.filter(r => r.target === formName);
  const outgoingRels = DATA.relationships.filter(r => r.source === formName);
  const wfsTouching = DATA.workflows.filter(w =>
    w.fieldUsage.some(u => u.form === formName) ||
    (w.trigger && w.trigger.form === formName) ||
    w.actions.some(a => a.targetForm === formName));

  panel.className = 'panel';
  panel.innerHTML = `
    <button class="close-btn" onclick="renderEmpty()">×</button>
    <button class="pin-btn${pinnedForm===formName?' active':''}" onclick="togglePin('${escapeAttr(formName)}')">${pinnedForm===formName?'Pinned':'Pin'}</button>
    <button id="export-btn" class="pin-btn" onclick="exportFormMarkdown()" title="Copy field list as markdown">Export</button>
    ${formHistory.length > 1 ? `<div class="breadcrumb">${formHistory.map((n,i) => {
      const last = i === formHistory.length - 1;
      return last
        ? `<span class="bc-current">${escapeHtml(n)}</span>`
        : `<span class="bc-link" onclick="cy.$id('${escapeAttr(n)}').emit('tap')">${escapeHtml(n)}</span>`;
    }).join('<span class="bc-sep">›</span>')}</div>` : ''}
    <h2>${escapeHtml(f.name)}</h2>
    <span class="role ${f.role}">${f.role}</span>${f.featured ? '<span class="badge featured">Featured</span>' : ''}
    <div class="meta">
      ${f.version ? `<b>v${f.version}</b>${f.versionCount > 1 ? ` &middot; ${f.versionCount} versions on file` : ''}<br>` : ''}
      ${f.subformOf ? `Embedded grid of <b>${escapeHtml(f.subformOf)}</b><br>` : ''}
      ${(!nar && f.description) ? `${escapeHtml(f.description)}<br>` : ''}
      <b>${f.fieldCount}</b> fields ·
      <b>${incomingRels.length}</b> incoming links ·
      <b>${outgoingRels.length}</b> outgoing links<br>
      <b>${wfsTouching.length}</b> workflow(s) touch this form
    </div>

    ${nar ? `<div class="section"><h3>What this form does</h3>
      <div class="summary-prose">
        <span class="lead">${escapeHtml(nar.summary.role_line)}</span>
        ${nar.summary.collects ? ' ' + escapeHtml(nar.summary.collects) : ''}
        ${nar.summary.connects ? ' ' + escapeHtml(nar.summary.connects) : ''}
        ${nar.summary.workflows ? '<br>' + escapeHtml(nar.summary.workflows) : ''}
        <br><span class="muted">${escapeHtml(nar.summary.fields)}${
          nar.summary.interactions ? ' ' + escapeHtml(nar.summary.interactions) : ''}</span>
      </div>
      <a class="brief-link" href="forms/${escapeAttr(briefFilename(formName))}.html" target="_blank" rel="noopener">Open full brief &rarr;</a>
    </div>` : ''}

    ${outgoingRels.length ? `<div class="section"><h3>Outgoing relationships</h3>
      ${outgoingRels.map(r => `<div class="usage" style="border-left-color:var(--accent)">
        ${escapeHtml(r.via)} → ${escapeHtml(r.target)}
        <div class="ctx">match field on target: ${escapeHtml(r.label||'(none)')}</div></div>`).join('')}
      </div>` : ''}

    ${incomingRels.length ? `<div class="section"><h3>Incoming relationships</h3>
      ${incomingRels.map(r => `<div class="usage">${escapeHtml(r.source)} → ${escapeHtml(r.via)}</div>`).join('')}
      </div>` : ''}

    ${wfsTouching.length ? `<div class="section"><h3>Workflows touching this form</h3>
      ${wfsTouching.map(w => `<div class="wf-card" onclick="cy.$('#WF:${w.callsign}').emit('tap')">
        <span class="cs">${escapeHtml(w.callsign)}</span>
        <div class="nm">${escapeHtml(w.name)}</div>
      </div>`).join('')}
      </div>` : ''}

    <div class="section">
      <h3>Fields (${fields.length})</h3>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <input class="field-search" id="field-search" placeholder="filter fields..."
               value="${escapeHtml(activeFieldFilter)}" style="flex:1;margin-bottom:0">
        <button id="filter-lock" class="mini-btn${lockFieldFilter?' active':''}"
                title="Keep this filter when switching forms" onclick="toggleFilterLock()">Lock</button>
      </div>
      <select id="field-mode-filter" class="field-search" style="margin-bottom:8px"
              title="Show only fields whose formula, visibility, required, or filter logic was authored this way"
              onchange="activeModeFilter=this.value; renderFieldList('${escapeAttr(formName)}')">
        <option value=""${activeModeFilter===''?' selected':''}>All configuration</option>
        <option value="Advanced"${activeModeFilter==='Advanced'?' selected':''}>Advanced (code) only</option>
        <option value="Conditional"${activeModeFilter==='Conditional'?' selected':''}>Conditional (rule builder) only</option>
      </select>
      <div class="field-list" id="field-list" role="listbox"></div>
    </div>

    ${ixFields.length ? `<div class="section"><h3>Field interactions (${ixFields.length})</h3>
      <details class="interactions">
        <summary>Show which fields trigger what on this form</summary>
        ${ixFields.slice(0, 12).map(fn => {
          const e = nar.forward[fn];
          const n = e.fields.length + e.wfCondition.length;
          return `<div class="ix-row" onclick="focusFieldDetail('${escapeAttr(formName)}','${escapeAttr(fn)}')">
            <span class="n">${escapeHtml(fn)}</span> <span class="c">&rarr; ${n} effect(s)</span></div>`;
        }).join('')}
        ${ixFields.length > 12 ? `<div class="ix-row"><span class="c">+${ixFields.length - 12} more fields</span></div>` : ''}
        <button class="mini-btn" style="margin-top:10px" onclick="toggleMiniMap('${escapeAttr(formName)}',this)">Show interaction map</button>
        <div id="mini-cy-wrap"></div>
      </details>
    </div>` : ''}
  `;

  const searchEl = document.getElementById('field-search');
  if (searchEl) {
    searchEl.addEventListener('input', e => { activeFieldFilter = e.target.value; renderFieldList(formName); });
    searchEl.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const list = document.getElementById('field-list');
        const first = list && list.querySelector('.field-row');
        if (first) setRovingRow(first);
      }
    });
  }
  renderFieldList(formName);
}

// Fields matching the current filter; expansion state is tracked separately so a
// filter only changes what's visible, never what's expanded.
// Config text a field carries beyond its name/label -- formula, validator, and
// the raw visibility/required/filter expressions (e.g. an IsInGroup(...) call) --
// so searching for a function or token surfaces every field using it that way.
function fieldConfigText(f){
  return [f.formula, f.validator, f.visibilityExpr, f.validationExpr, f.filterExpr]
    .filter(Boolean).join(' \x00 ').toLowerCase();
}

// The four config-mode slots a field can carry: 'Advanced' (raw code) or
// 'Conditional' (the platform's visual rule builder). A field can mix both
// across its formula/visibility/required/filter -- fieldModes() collects the
// distinct set present so filtering and badges only need to check membership.
function fieldModes(f){
  return new Set([f.formulaMode, f.visibilityMode, f.validationMode, f.filterMode].filter(Boolean));
}

function visibleFields(formName){
  const q = activeFieldFilter.toLowerCase();
  return (DATA.fields[formName] || []).filter(f => {
    if (activeModeFilter && !fieldModes(f).has(activeModeFilter)) return false;
    return !q || f.name.toLowerCase().includes(q) || (f.label||'').toLowerCase().includes(q)
      || fieldConfigText(f).includes(q);
  });
}

// Map of field name -> Set of directions (Read/Write/Condition) for every workflow
// that touches the given form.  Used both for the .touched row class and the R/W/C badges.
function buildTouchedDirs(formName){
  const dirs = new Map();
  DATA.workflows.forEach(w => w.fieldUsage.forEach(u => {
    if (u.form !== formName) return;
    if (!dirs.has(u.field)) dirs.set(u.field, new Set());
    dirs.get(u.field).add(u.direction);
  }));
  return dirs;
}

function sortFields(fields){
  if (fieldSortMode === 'original') return fields;
  const copy = fields.slice();
  if (fieldSortMode === 'required-first'){
    copy.sort((a, b) => {
      const ra = a.required === 'Yes' ? 0 : 1, rb = b.required === 'Yes' ? 0 : 1;
      return ra - rb;
    });
  } else if (fieldSortMode === 'hidden-last'){
    copy.sort((a, b) => {
      const ha = a.hidden === 'Yes' ? 1 : 0, hb = b.hidden === 'Yes' ? 1 : 0;
      return ha - hb;
    });
  } else if (fieldSortMode === 'type-grouped'){
    copy.sort((a, b) => (a.type||'').localeCompare(b.type||'') || (a.name||'').localeCompare(b.name||''));
  }
  return copy;
}

// Move the roving tabindex to a specific row and focus it (used by arrow-key navigation).
function setRovingRow(row){
  if (!row) return;
  const list = document.getElementById('field-list');
  if (!list) return;
  list.querySelectorAll('.field-row').forEach(r => r.setAttribute('tabindex', '-1'));
  row.setAttribute('tabindex', '0');
  keyboardActiveField = row.dataset.field;
  row.focus();
  row.scrollIntoView({block:'nearest'});
}

// After every renderFieldList, re-establish the roving tabindex without stealing focus.
// If refocus is true (sort/expand-all/collapse-all re-renders), also move focus to the row.
function restoreRoving(refocus){
  const list = document.getElementById('field-list');
  if (!list) return;
  const rows = list.querySelectorAll('.field-row');
  if (!rows.length) return;
  let target = null;
  rows.forEach(r => {
    r.setAttribute('tabindex', '-1');
    if (r.dataset.field === keyboardActiveField) target = r;
  });
  if (!target) { target = rows[0]; keyboardActiveField = target.dataset.field; }
  target.setAttribute('tabindex', '0');
  if (refocus) target.focus();
}

function scrollToWfAction(targetForm, actionIdx){
  const cards = document.querySelectorAll('.wf-card[data-action-form]');
  // Prefer the exact action (edges carry actionIndex); fall back to the first
  // card whose target form matches (old behavior, e.g. when idx is absent).
  let match = null;
  if (actionIdx !== undefined && actionIdx !== null && actionIdx !== ''){
    match = document.querySelector(`.wf-card[data-action-idx="${actionIdx}"]`);
  }
  if (!match){
    for (const card of cards){
      if (card.dataset.actionForm === targetForm){ match = card; break; }
    }
  }
  if (match){
    match.scrollIntoView({block:'nearest'});
    const prev = match.style.borderColor;
    match.style.borderColor = 'var(--accent)';
    setTimeout(() => { match.style.borderColor = prev; }, 1500);
  }
}

function exportFormMarkdown(){
  if (!currentFormName) return;
  const f = DATA.forms.find(x => x.name === currentFormName);
  if (!f) return;
  const allFields = DATA.fields[currentFormName] || [];
  const visible = visibleFields(currentFormName);
  const incomingRels = DATA.relationships.filter(r => r.target === currentFormName);
  const outgoingRels = DATA.relationships.filter(r => r.source === currentFormName);
  const wfsTouching = DATA.workflows.filter(w =>
    w.fieldUsage.some(u => u.form === currentFormName) ||
    (w.trigger && w.trigger.form === currentFormName) ||
    w.actions.some(a => a.targetForm === currentFormName));
  const touchedDirs = buildTouchedDirs(currentFormName);

  const lines = [
    `## ${f.name} (${f.role})`,
    '',
    `${allFields.length} fields · ${incomingRels.length} incoming links · ${outgoingRels.length} outgoing links · ${wfsTouching.length} workflow(s)`,
  ];
  if (activeFieldFilter)
    lines.push(`*(showing ${visible.length} of ${allFields.length} matching "${activeFieldFilter}")*`);
  lines.push('', '| API Name | Label | Type | Required | WF |', '|---|---|---|---|---|');
  visible.forEach(field => {
    const dirs = touchedDirs.get(field.name);
    const wf = dirs ? ['Read','Write','Condition'].filter(d => dirs.has(d)).map(d=>d[0]).join('') : '';
    lines.push(`| \`${field.name}\` | ${field.label||''} | ${field.type||''} | ${field.required==='Yes'?'Yes':''} | ${wf} |`);
  });

  const md = lines.join('\n');
  const btn = document.getElementById('export-btn');
  const done = () => {
    if (btn) { const orig = btn.textContent; btn.textContent = 'Copied!'; setTimeout(()=>{btn.textContent=orig;},1500); }
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(md).then(done).catch(()=>{ fallbackCopy(md); done(); });
  } else { fallbackCopy(md); done(); }
}

function togglePin(formName){
  pinnedForm = pinnedForm === formName ? null : formName;
  renderForm(formName);
}

function saveFormFieldState(formName){
  if (!formName) return;
  formFieldState[formName] = {
    filter: activeFieldFilter,
    expanded: new Set(expandedFields),
    keyboardField: keyboardActiveField,
  };
}

function toggleFilterLock(){
  lockFieldFilter = !lockFieldFilter;
  try { localStorage.setItem(FILTER_LOCK_KEY, lockFieldFilter); } catch(e) {}
  const btn = document.getElementById('filter-lock');
  if (btn) btn.classList.toggle('active', lockFieldFilter);
}

function buildUsedBySet(formName){
  const s = new Set();
  (DATA.fields[formName] || []).forEach(f => {
    (f.dependsOnAll || []).forEach(dep => s.add(dep));
  });
  return s;
}

function renderFieldList(formName, refocus){
  const list = document.getElementById('field-list');
  if (!list) return;
  const touchedDirs = buildTouchedDirs(formName);
  const usedBySet = buildUsedBySet(formName);
  const visible = visibleFields(formName);

  const controls = `<div class="field-controls">
    <span class="exp-count" id="exp-count">${expandedFields.size} expanded</span>
    <span class="spacer"></span>
    <button class="mini-btn" onclick="collapseAllFields()">Collapse all</button>
    <button class="mini-btn" onclick="expandAllFields()">Expand all</button>
  </div>`;

  if (!visible.length) {
    const bits = [];
    if (activeFieldFilter) bits.push(`match <b style="color:var(--text)">${escapeHtml(activeFieldFilter)}</b>`);
    if (activeModeFilter) bits.push(`have ${activeModeFilter}-mode configuration`);
    const noResultMsg = bits.length ? `No fields ${bits.join(' and ')}` : 'No fields';
    const clearBtn = (activeFieldFilter || activeModeFilter)
      ? `<br><button class="mini-btn" style="margin-top:8px" onclick="clearFieldFilter()">Clear filter</button>`
      : '';
    list.innerHTML = controls + `<div class="empty-state" style="font-style:normal">${noResultMsg}${clearBtn}</div>`;
    restoreRoving(false);
    return;
  }

  // Direction badges: R / W / C in fixed order, distinct colors.
  const DIR_ORDER = ['Read', 'Write', 'Condition'];
  function dirBadges(dirs){
    if (!dirs) return '';
    return DIR_ORDER.filter(d => dirs.has(d))
      .map(d => `<span class="badge dir-${d.toLowerCase()}">${d[0]}</span>`).join('');
  }

  // When the field list is filtered by config text (formula/visibility/required/filter)
  // rather than by name or label, flag it so the match reason is visible at a glance.
  const q = activeFieldFilter.toLowerCase();
  function isConfigMatch(f){
    if (!q) return false;
    if (f.name.toLowerCase().includes(q) || (f.label||'').toLowerCase().includes(q)) return false;
    return fieldConfigText(f).includes(q);
  }

  function modeBadges(f){
    const modes = fieldModes(f);
    let out = '';
    if (modes.has('Advanced')) out += '<span class="badge mode-advanced" title="Has formula/visibility/required/filter logic written in the Advanced code editor">ADV</span>';
    if (modes.has('Conditional')) out += '<span class="badge mode-conditional" title="Has formula/visibility/required/filter logic built with the Conditional rule builder">COND</span>';
    return out;
  }

  function renderFieldRow(f){
    const dirs = touchedDirs.get(f.name);
    const isExp = expandedFields.has(f.name);
    const primary   = fieldDisplayMode === 'label' ? (f.label || f.name) : f.name;
    const secondary = fieldDisplayMode === 'label' ? f.name : (f.label || '');
    return `<div class="field-row" data-field="${escapeAttr(f.name)}" tabindex="-1" role="option">
      <div class="field ${dirs?'touched':''} ${isExp?'expanded':''}"
           onclick="toggleField(this,'${escapeAttr(formName)}','${escapeAttr(f.name)}')">
        <span class="chev"></span>
        <span class="fname">${escapeHtml(primary)}</span><button class="copy-btn" title="Copy API name: ${escapeAttr(f.name)}" onclick="copyFieldName(event,'${escapeAttr(f.name)}')">⧉</button>
        <span class="ftype">${escapeHtml(f.type||'')}</span>
        <span class="flbl">${escapeHtml(secondary)}</span>
        <span class="badges">
          ${dirBadges(dirs)}
          ${isConfigMatch(f)?`<span class="badge dep-uses" title="Matches “${escapeAttr(activeFieldFilter)}” in this field's formula, visibility, required, or filter logic">CFG</span>`:''}
          ${modeBadges(f)}
          ${f.required==='Yes'?'<span class="badge req">REQ</span>':''}
          ${f.component==='FormRelationshipInput'?'<span class="badge rel">REL</span>':''}
          ${f.component==='FormRelationshipReferenceDataInput'?'<span class="badge ref">REF</span>':''}
          ${(f.dependsOnAll||[]).length?'<span class="badge dep-uses" title="This field\'s formula, visibility, or validation references other fields on this form">DEP</span>':''}
          ${usedBySet.has(f.name)?'<span class="badge dep-used" title="Other fields on this form reference this field in their formula, visibility, or validation">REF\'D</span>':''}
        </span>
      </div>
      ${isExp ? `<div class="field-detail">${fieldDetailHTML(formName, f.name)}</div>` : ''}
    </div>`;
  }

  // Group visible fields by section > page > 'General' in order of first
  // appearance, which is already platform visual order (sorted in the parser).
  // When a field has both page and section, the header shows "Page › Section".
  const groups = [];
  const groupMap = {};
  for (const f of visible){
    // Unique key per (page, section) combination.
    const gkey = f.section
      ? (f.page || '') + '\x00' + f.section
      : (f.page ? '\x01' + f.page : '\x02');
    if (!groupMap[gkey]){
      const label = f.section
        ? (f.page ? f.page + ' › ' + f.section : f.section)
        : (f.page || 'General');
      const g = {label, fields: []};
      groups.push(g);
      groupMap[gkey] = g;
    }
    groupMap[gkey].fields.push(f);
  }
  groups.forEach(g => { g.fields = sortFields(g.fields); });

  // If the only group is the 'General' fallback the form has no page/section
  // structure — render flat with no header (identical to pre-feature behavior).
  const onlyGeneral = groups.length === 1 && groups[0].label === 'General';

  if (onlyGeneral){
    list.innerHTML = controls + groups[0].fields.map(renderFieldRow).join('');
  } else {
    list.innerHTML = controls + `<div class="field-groups">${
      groups.map(g => `<div class="field-group">
        <div class="field-group-header">${escapeHtml(g.label)}<span class="field-group-count">${g.fields.length}</span></div>
        ${g.fields.map(renderFieldRow).join('')}
      </div>`).join('')
    }</div>`;
  }
  restoreRoving(!!refocus);
}

function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy');
  document.body.removeChild(ta);
}

function copyFieldName(evt, fieldName){
  evt.stopPropagation();
  const btn = evt.currentTarget;
  const done = () => {
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⧉'; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(fieldName).then(done).catch(() => { fallbackCopy(fieldName); done(); });
  } else {
    fallbackCopy(fieldName); done();
  }
}

function clearFieldFilter(){
  activeFieldFilter = '';
  activeModeFilter = '';
  const searchEl = document.getElementById('field-search');
  if (searchEl) { searchEl.value = ''; searchEl.focus(); }
  const modeEl = document.getElementById('field-mode-filter');
  if (modeEl) modeEl.value = '';
  if (currentFormName) renderFieldList(currentFormName);
}

function updateExpandCount(){
  const el = document.getElementById('exp-count');
  if (el) el.textContent = `${expandedFields.size} expanded`;
}

// Toggle one field's inline detail. Targeted DOM edit (not a full re-render) so the
// scroll position is preserved and only the toggled field's detail is built.
// Open one field's inline detail from the "Field interactions" rollup: clear any
// active filter so the field is visible, expand it, and scroll it into view.
function focusFieldDetail(formName, fieldName){
  activeFieldFilter = '';
  activeModeFilter = '';
  const se = document.getElementById('field-search');
  if (se) se.value = '';
  const me = document.getElementById('field-mode-filter');
  if (me) me.value = '';
  expandedFields.add(fieldName);
  renderFieldList(currentFormName || formName, true);
  document.querySelectorAll('#field-list .field-row').forEach(row => {
    if (row.getAttribute('data-field') === fieldName) {
      row.scrollIntoView({behavior:'smooth', block:'center'});
    }
  });
}

// Small, focused, opt-in trigger diagram for the selected form. Reuses the
// already-loaded Cytoscape + Dagre. Shows ONLY participating fields + their
// targets + referenced workflow nodes, capped at MINI_MAX nodes — never the
// whole form. Mounted lazily on toggle; destroyed on panel switch.
let miniCy = null;
const MINI_MAX = 25;
const MINI_EDGE_COLOR = {visibility:'#fbbf24', formula:'#f87171', validation:'#a78bfa',
                         filter:'#60a5fa', wf:'#9fae5a'};
function destroyMiniMap(){
  if (miniCy){ try { miniCy.destroy(); } catch(e){} miniCy = null; }
}
function toggleMiniMap(formName, btn){
  const wrap = document.getElementById('mini-cy-wrap');
  if (!wrap) return;
  if (miniCy){
    destroyMiniMap();
    wrap.innerHTML = '';
    btn.textContent = 'Show interaction map';
    return;
  }
  wrap.innerHTML = '<div id="mini-cy"></div>';
  btn.textContent = 'Hide interaction map';
  mountMiniDiagram(formName);
}
function mountMiniDiagram(formName){
  const nar = (DATA.narrative && DATA.narrative[formName]) || null;
  const cont = document.getElementById('mini-cy');
  if (!nar || !cont) return;
  const els = [], seen = new Set();
  let trimmed = 0;
  const addNode = (id, label, cls) => {
    if (seen.has(id)) return true;
    if (seen.size >= MINI_MAX){ trimmed++; return false; }
    seen.add(id); els.push({data:{id, label}, classes:cls}); return true;
  };
  const fieldKeys = Object.keys(nar.forward).filter(fn =>
    nar.forward[fn].fields.length || nar.forward[fn].wfCondition.length);
  for (const fn of fieldKeys){
    if (!addNode('f:'+fn, fn, 'fld')) continue;
    const e = nar.forward[fn];
    e.fields.forEach(x => {
      if (addNode('f:'+x.target, x.target, 'fld'))
        els.push({data:{source:'f:'+fn, target:'f:'+x.target, kind:x.kind}});
    });
    e.wfCondition.forEach(cs => {
      if (addNode('w:'+cs, cs, 'wf'))
        els.push({data:{source:'f:'+fn, target:'w:'+cs, kind:'wf'}});
    });
  }
  miniCy = cytoscape({
    container: cont,
    elements: els,
    style: [
      {selector:'node', style:{
        'label':'data(label)', 'color':'#e8ebf0', 'font-size':9, 'font-weight':600,
        'text-valign':'center', 'text-halign':'center', 'text-wrap':'wrap',
        'text-max-width':90, 'width':'label', 'height':22, 'padding':'6px',
        'shape':'round-rectangle', 'background-color':'#1e3a5f',
        'border-width':1, 'border-color':'#0f1115'}},
      {selector:'node.wf', style:{'background-color':'#5f2424'}},
      {selector:'edge', style:{
        'width':1.5, 'curve-style':'bezier', 'target-arrow-shape':'triangle',
        'line-color': ele => MINI_EDGE_COLOR[ele.data('kind')] || '#888',
        'target-arrow-color': ele => MINI_EDGE_COLOR[ele.data('kind')] || '#888'}},
      {selector:'edge[kind="wf"]', style:{'line-style':'dashed'}},
    ],
    layout: {name:'dagre', rankDir:'LR', nodeSep:14, rankSep:46, fit:true, padding:12},
    userZoomingEnabled:true, userPanningEnabled:true,
  });
  if (trimmed){
    const note = document.createElement('div');
    note.className = 'ctx';
    note.style.marginTop = '4px';
    note.textContent = `graph trimmed — ${trimmed} more interaction(s) not shown`;
    cont.parentNode.appendChild(note);
  }
}

function toggleField(headerEl, formName, fieldName){
  const row = headerEl.closest('.field-row');
  if (expandedFields.has(fieldName)) {
    expandedFields.delete(fieldName);
    headerEl.classList.remove('expanded');
    const d = row.querySelector('.field-detail');
    if (d) d.remove();
  } else {
    expandedFields.add(fieldName);
    headerEl.classList.add('expanded');
    const d = document.createElement('div');
    d.className = 'field-detail';
    d.innerHTML = fieldDetailHTML(formName, fieldName);
    row.appendChild(d);
    pulseConnectedForm(formName, fieldName);
  }
  updateExpandCount();
}

function expandAllFields(){
  if (!currentFormName) return;
  const visible = visibleFields(currentFormName);
  const toOpen = visible.filter(f => !expandedFields.has(f.name));
  if (!toOpen.length) return;
  if (toOpen.length > 20 &&
      !confirm(`Expand all ${toOpen.length} fields? This may take a moment on a large form.`)) {
    return;
  }
  visible.forEach(f => expandedFields.add(f.name));
  renderFieldList(currentFormName, true);
}

function collapseAllFields(){
  expandedFields.clear();
  if (currentFormName) renderFieldList(currentFormName, true);
}

// Flash the connected form when a relationship field is expanded.
function pulseConnectedForm(formName, fieldName){
  const field = (DATA.fields[formName]||[]).find(f => f.name === fieldName);
  if (!field) return;
  let cf = null;
  if (field.component === 'FormRelationshipInput') cf = field.relatedForm || null;
  else if (field.component === 'FormRelationshipReferenceDataInput') cf = relationshipTarget(formName, field.via);
  if (cf) { const cn = cy.$id(cf); if (cn.nonempty()) cn.flashClass('pulse', 1300); }
}

// Resolve the form on the far end of one of formName's relationship fields.
function relationshipTarget(formName, via){
  const rel = DATA.relationships.find(r => r.source === formName && r.via === via);
  return rel ? rel.target : null;
}

// One field-detail config block (Formula/Visibility/Required/Filter). Shows the
// authoring mode next to the header always; the raw text when resolved (both
// Advanced code and Conditional rule-builder expressions render to text), else
// a fallback naming the fields the rule touches (e.g. a comparison type this
// renderer doesn't decode yet).
function configSectionHTML(title, mode, text, deps){
  if (!mode) return '';
  const modeTag = `<span class="badge mode-${mode.toLowerCase()}" style="margin-left:6px">${mode.toUpperCase()}</span>`;
  const body = text
    ? `<div class="usage" style="font-family:monospace;white-space:pre-wrap;line-height:1.4">${escapeHtml(text)}</div>`
    : `<div class="empty-state" style="font-style:normal">${(deps||[]).length
        ? `Conditional rule referencing ${(deps||[]).map(escapeHtml).join(', ')}`
        : 'Conditional rule (not yet renderable)'}</div>`;
  return `<h3>${title}${modeTag}</h3>${body}`;
}

// Inner HTML for a field's inline detail block (no DOM side effects).
// Forward phrasing — mirror of narrate.py FORWARD_PHRASE/KIND_BADGE (kept in sync).
const FORWARD_PHRASE = {
  visibility: t => `shows or hides ${t}`,
  formula:    t => `automatically updates ${t}`,
  validation: t => `changes whether ${t} must be filled in`,
  filter:     t => `changes which choices appear in ${t}`,
};
const FORWARD_BADGE = {visibility:'VISIBLE', formula:'FX', validation:'REQ', filter:'FILTER'};

// A field's human name: label when present, else the API name.
function fieldLabelOf(formName, apiName){
  const f = (DATA.fields[formName]||[]).find(x => x.name === apiName);
  const lbl = f && (f.label||'').trim();
  return (lbl && lbl !== apiName) ? lbl : apiName;
}
// narrative wfCondition/writtenBy entries are {callsign, name} objects; show the name.
const wfRefName = r => (r && (r.name || r.callsign)) || String(r);

function fieldDetailHTML(formName, fieldName){
  const field = (DATA.fields[formName]||[]).find(f => f.name === fieldName);
  if (!field) return '';

  // Forward triggers: what changing THIS field activates (fields + workflow branches).
  const fwd = (DATA.narrative && DATA.narrative[formName]
               && DATA.narrative[formName].forward[fieldName]) || null;

  const usages = [];
  DATA.workflows.forEach(w => w.fieldUsage.forEach(u => {
    if (u.form === formName && u.field === fieldName) usages.push({wf:w, usage:u});
  }));

  // Reverse direction: forms that pull this field in via a ReferenceDataInput.
  // A refPull {destForm, via, sourceField} pulls sourceField from the form that
  // destForm reaches through relationship `via`; match that resolved form + field.
  const referencedBy = [];
  DATA.refPulls.forEach(r => {
    if (r.sourceField !== fieldName) return;
    if (relationshipTarget(r.destForm, r.via) === formName) {
      referencedBy.push({form: r.destForm, via: r.via, localField: r.destField});
    }
  });

  // Intra-form reverse: other fields on this form whose config depends on this field.
  const KIND_PHRASE = {
    validation: f => `Validation / required rule on ${f}`,
    formula:    f => `Formula for computed field ${f}`,
    filter:     f => `Filter condition on ${f}`,
    visibility: f => `Visibility condition on ${f}`,
  };
  const KIND_BADGE = {validation:'REQ', formula:'FX', filter:'FILTER', visibility:'VISIBLE'};
  const intraRefs = [];
  (DATA.fields[formName] || []).forEach(g => {
    const dep = g.dependsOn || {};
    Object.keys(KIND_PHRASE).forEach(kind => {
      if ((dep[kind] || []).includes(fieldName)) intraRefs.push({by: g.name, kind});
    });
  });

  return `
    <div class="meta">
      <b>Label:</b> ${escapeHtml(field.label||'(none)')}<br>
      <b>Type:</b> ${escapeHtml(field.type||'')}<br>
      <b>Component:</b> ${escapeHtml(field.component||'')}<br>
      ${field.relatedForm?`<b>Linked to:</b> ${escapeHtml(field.relatedForm)}<br>`:''}
      ${field.relatedField?`<b>Pulls field:</b> ${escapeHtml(field.relatedField)}<br>`:''}
      ${field.via?`<b>Via relationship:</b> ${escapeHtml(field.via)}<br>`:''}
      ${field.defaultValue?`<b>Default:</b> ${escapeHtml(field.defaultValue)}<br>`:''}
      ${field.validator?`<b>Validator:</b> ${escapeHtml(field.validator)}<br>`:''}
    </div>

    ${configSectionHTML('Formula', field.formulaMode, field.formula, field.dependsOn && field.dependsOn.formula)}
    ${configSectionHTML('Visibility condition', field.visibilityMode, field.visibilityExpr, field.dependsOn && field.dependsOn.visibility)}
    ${configSectionHTML('Required / validation condition', field.validationMode, field.validationExpr, field.dependsOn && field.dependsOn.validation)}
    ${configSectionHTML('Filter condition', field.filterMode, field.filterExpr, field.dependsOn && field.dependsOn.filter)}

    ${fwd && (fwd.fields.length || fwd.wfCondition.length) ? `<h3>Changing this field affects (${fwd.fields.length + fwd.wfCondition.length})</h3>
      ${fwd.fields.slice(0,6).map(x => `<div class="usage Condition" title="${escapeAttr(x.target)}">
        <span class="dir">${FORWARD_BADGE[x.kind]||'DEP'}</span>${escapeHtml(fieldLabelOf(formName, x.target))}
        <div class="ctx">${escapeHtml((FORWARD_PHRASE[x.kind]||(t=>t))(fieldLabelOf(formName, x.target)))}</div>
      </div>`).join('')}
      ${fwd.fields.length>6 ? `<div class="empty-state" style="font-style:normal">+${fwd.fields.length-6} more fields</div>`:''}
      ${fwd.wfCondition.map(r => `<div class="usage Condition">
        <span class="dir">FLOW</span>${escapeHtml(wfRefName(r))}
        <div class="ctx">helps decide whether this automated step runs</div>
      </div>`).join('')}`
      :''}

    ${fwd && fwd.writtenBy.length ? `<div class="ctx" style="margin-top:4px">Filled in automatically by ${fwd.writtenBy.map(r => escapeHtml(wfRefName(r))).join(', ')} — normally not edited by hand</div>`:''}

    ${usages.length?
      `<h3>Workflow usage (${usages.length})</h3>
       ${usages.map(({wf,usage}) => `<div class="usage ${usage.direction}">
         <span class="dir">${usage.direction}</span>${escapeHtml(wf.callsign)}
         <div class="ctx">${escapeHtml(usage.context)}</div>
       </div>`).join('')}`
      :'<div class="empty-state">no workflows touch this field yet</div>'}

    <h3>Referenced by (${referencedBy.length})</h3>
    ${referencedBy.length?
      referencedBy.map(x => `<div class="usage Match">
        <span class="dir">REF</span>${escapeHtml(x.form)}
        <div class="ctx">via ${escapeHtml(x.via)} → ${escapeHtml(x.localField)}</div>
      </div>`).join('')
      :'<div class="empty-state">no forms reference this field</div>'}

    <h3>Used within this form (${intraRefs.length})</h3>
    ${intraRefs.length?
      intraRefs.map(x => `<div class="usage Condition">
        <span class="dir">${KIND_BADGE[x.kind]}</span>${escapeHtml(x.by)}
        <div class="ctx">${escapeHtml(KIND_PHRASE[x.kind](x.by))}</div>
      </div>`).join('')
      :'<div class="empty-state">not referenced by other fields on this form</div>'}
  `;
}

function renderWorkflow(callsign){
  saveFormFieldState(currentFormName);
  currentFormName = null;
  const w = DATA.workflows.find(x => x.callsign === callsign);
  if (!w) return;
  const st = (DATA.wfStories && DATA.wfStories[callsign]) || null;
  const cf = (DATA.wfConflicts && DATA.wfConflicts[callsign]) || null;
  panel.className = 'panel';
  panel.innerHTML = `
    <button class="close-btn" onclick="renderEmpty()">×</button>
    <h2>${escapeHtml(w.name)}</h2>
    <span class="role Workflow">Workflow · ${escapeHtml(w.callsign)}</span>${
      w.enabled === false ? '<span class="badge off">Disabled</span>' : ''}

    ${st ? `<div class="section"><h3>What this does</h3>
      <div class="wf-story-panel">
        <div class="story-when">${escapeHtml(st.when)}</div>
        ${st.then.map(t => `<div class="story-then">${escapeHtml(t)}</div>`).join('')}
        ${st.disabled ? '<div class="story-off">Currently switched off — it will not run.</div>' : ''}
      </div>
    </div>` : ''}

    ${cf ? `<div class="section"><h3>⚠ Write conflicts</h3>
      <div class="wf-conflict-panel">
        ${cf.map(c => `<div class="cf-row">
          Also writes <span class="cf-field">${escapeHtml(c.form)} · ${escapeHtml(c.field)}</span>:
          ${c.others.map(o => `<span class="cf-link" onclick="cy.$id('WF:${escapeAttr(o.callsign)}').emit('tap')">${escapeHtml(o.name)}</span>`).join(', ')}
        </div>`).join('')}
      </div>
    </div>` : ''}

    <div class="section"><h3>Trigger</h3>
      <div class="usage Condition">
        <span class="dir">${escapeHtml(w.trigger.type.split(' · ')[0])}</span>${escapeHtml(w.trigger.form)}
        <div class="ctx">${escapeHtml(w.trigger.condition)}</div>
      </div>
    </div>

    <div class="section"><h3>Actions</h3>
      ${w.actions.map((a, i) => `<div class="wf-card" data-action-form="${escapeAttr(a.targetForm)}" data-action-idx="${i}">
        <div class="nm">${escapeHtml(a.name)}</div>
        <div class="cs">${escapeHtml(a.type)}</div>
        <div class="desc">target: ${escapeHtml(a.targetForm)}<br>
        dup policy: ${escapeHtml(a.duplicatePolicy)} · match: ${escapeHtml(a.matchOn||'(none)')}</div>
      </div>`).join('')}
    </div>

    <div class="section"><h3>Field usage (${w.fieldUsage.length})</h3>
      ${w.fieldUsage.map(u => `<div class="usage ${u.direction}">
        <span class="dir">${u.direction}</span>${escapeHtml(u.form)} · ${escapeHtml(u.field)}
        <div class="ctx">${escapeHtml(u.context)}</div>
      </div>`).join('')}
    </div>
  `;
  highlightWorkflow(w);
}

function highlightWorkflow(w){
  clearHighlights();
  cy.elements().addClass('dim');
  const touched = new Set();
  touched.add('WF:'+w.callsign);
  if (w.trigger && w.trigger.form) touched.add(w.trigger.form);
  w.actions.forEach(a => a.targetForm && touched.add(a.targetForm));
  touched.forEach(id => {
    const n = cy.$id(id);
    n.removeClass('dim').addClass('highlight');
    n.connectedEdges().forEach(e => {
      if (touched.has(e.source().id()) && touched.has(e.target().id())) {
        e.removeClass('dim').addClass('highlight');
      }
    });
  });
}

// Edge-detail view — the third side-panel category alongside form-detail and
// field-detail. Renders every individual relationship carried by the edge even
// when its graph label is an aggregate count.
function renderEdge(e){
  saveFormFieldState(currentFormName);
  currentFormName = null;
  const src = e.data('source'), tgt = e.data('target');
  const rels = e.data('rels') || [];
  const pulls = e.data('pulls') || 0;
  const count = `${rels.length} relationship${rels.length===1?'':'s'}` +
                (pulls ? ` · ${pulls} pull${pulls===1?'':'s'}` : '');
  panel.className = 'panel';
  panel.innerHTML = `
    <button class="close-btn" onclick="renderEmpty()">×</button>
    <h2>Relationships from ${escapeHtml(src)} to ${escapeHtml(tgt)}</h2>
    <div class="meta">${count}</div>

    <div class="section"><h3>Relationships (${rels.length})</h3>
      ${rels.map(r => `<div class="usage Match">
        <span class="dir">REL</span>${escapeHtml(r.name)}
        <div class="ctx">via field: ${escapeHtml(r.via)}` +
          `${r.match ? ` · matches on: ${escapeHtml(r.match)}` : ''}` +
          `${r.pulls ? ` · ${r.pulls} pull${r.pulls===1?'':'s'}` : ''}</div>
      </div>`).join('')}
    </div>

    <div class="section"><h3>Navigate</h3>
      <button class="mini-btn" style="margin-right:6px" onclick="cy.$id('${escapeAttr(src)}').emit('tap')">View source form</button>
      <button class="mini-btn" onclick="cy.$id('${escapeAttr(tgt)}').emit('tap')">View target form</button>
    </div>
  `;
}

// Visual feedback for the active edge: dim the rest, glow the edge, lift its endpoints.
function selectEdgeVisual(e){
  clearHighlights();           // also drops any prior edge 'sel'
  cy.elements().addClass('dim');
  e.removeClass('dim').addClass('sel');
  e.connectedNodes().removeClass('dim').addClass('highlight');
}

cy.on('tap', 'node', evt => {
  const n = evt.target;
  activeNodeId = n.id();
  if (n.data('kind') === 'workflow') {
    if (!pinnedForm) renderWorkflow(n.data('wfRef'));
  } else {
    clearHighlights();
    cy.elements().addClass('dim');
    n.removeClass('dim').addClass('highlight');
    n.connectedEdges().forEach(e => {
      e.removeClass('dim').addClass('highlight');
      e.connectedNodes().removeClass('dim');
    });
    if (!pinnedForm) renderForm(n.id());
  }
});

cy.on('tap', 'edge', evt => {
  const e = evt.target;
  const kind = e.data('kind');

  if (kind === 'wf-edge'){
    const src = e.data('source'), tgt = e.data('target');
    const wfId = src.startsWith('WF:') ? src : tgt;
    const callsign = wfId.slice(3);
    const isAction = src.startsWith('WF:');
    const actionTarget = isAction ? tgt : null;
    const actionIdx = e.data('actionIndex');
    activeNodeId = null;
    const w = DATA.workflows.find(x => x.callsign === callsign);
    if (w) highlightWorkflow(w);
    if (!pinnedForm){
      renderWorkflow(callsign);
      if (isAction && actionTarget) setTimeout(() => scrollToWfAction(actionTarget, actionIdx), 0);
    }
    return;
  }

  // Relationship edges: show edge-detail panel with every individual relationship.
  if (kind !== 'relationship') return;
  activeNodeId = null;
  selectEdgeVisual(e);
  if (!pinnedForm) renderEdge(e);
});

cy.on('tap', evt => {
  if (evt.target === cy) {
    if (pinnedForm) clearHighlights();
    else renderEmpty();
  }
});

cy.on('mouseover', 'edge', e => e.target.addClass('hovered'));
cy.on('mouseout', 'edge', e => e.target.removeClass('hovered'));

// Toolbar wiring
document.getElementById('layout').addEventListener('change', e => {
  const name = e.target.value;
  if (name === 'preset') {
    cy.layout(hasPreset ? {name:'preset', positions: PRESET, fit:true, padding:60} : FORCE).run();
  } else if (name === 'cose') {
    cy.layout(FORCE).run();
  } else if (name === 'dagre') {
    cy.layout({name:'dagre', rankDir:'TB', nodeSep:50, rankSep:100,
               edgeSep:20, fit:true, padding:60, animate:true}).run();
  } else {
    cy.layout({name, fit:true, padding:60, animate:true}).run();
  }
});
document.getElementById('fit').addEventListener('click', () => cy.fit(undefined, 60));
document.getElementById('reset').addEventListener('click', () => {
  cy.layout(INITIAL).run();
  renderEmpty();
});

// Light/dark toggle. The head script already applied the saved theme; here we
// sync the button label and persist on change. Default dark.
const themeBtn = document.getElementById('theme-toggle');
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('explorer-theme', t); } catch (e) {}
  themeBtn.textContent = t === 'dark' ? 'Light mode' : 'Dark mode';
  // Role colors are resolved from CSS vars, which differ per theme — re-resolve
  // and re-apply to the (canvas-rendered) nodes since they can't track var() live.
  ROLE_COLOR = roleColors();
  if (typeof cy !== 'undefined') {
    cy.nodes().forEach(n => n.style('background-color', ROLE_COLOR[n.data('role')] || '#888'));
  }
}
let savedTheme = 'dark';
try { savedTheme = localStorage.getItem('explorer-theme') || 'dark'; } catch (e) {}
setTheme(savedTheme);
themeBtn.addEventListener('click', () =>
  setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

const matchCount = document.getElementById('match-count');
const plural = (n, w) => `${n} ${w}${n === 1 ? '' : 's'}`;

function workflowMatches(w, q){
  if (w.callsign.toLowerCase().includes(q) || (w.name||'').toLowerCase().includes(q)) return true;
  if (w.trigger) {
    if ((w.trigger.condition||'').toLowerCase().includes(q)) return true;
    if ((w.trigger.type||'').toLowerCase().includes(q)) return true;
  }
  return w.actions.some(a => (a.type||'').toLowerCase().includes(q));
}

function runSearch(raw){
  const q = raw.toLowerCase().trim();
  clearHighlights();
  if (!q) {
    matchCount.textContent = '';
    cy.animate({fit:{eles: cy.elements(), padding:60}}, {duration:250});
    return;
  }

  let formCount = 0, fieldCount = 0, wfCount = 0;
  const matches = cy.collection();
  DATA.forms.forEach(f => {
    const nameHit = f.name.toLowerCase().includes(q);
    if (nameHit) formCount++;
    const hits = (DATA.fields[f.name] || []).filter(x =>
      x.name.toLowerCase().includes(q) || (x.label||'').toLowerCase().includes(q));
    fieldCount += hits.length;
    if (nameHit || hits.length) matches.merge(cy.$id(f.name));
  });
  DATA.workflows.forEach(w => {
    if (workflowMatches(w, q)) { wfCount++; matches.merge(cy.$id('WF:'+w.callsign)); }
  });

  matchCount.textContent =
    `${raw.trim()} — ${plural(formCount,'form')}, ${plural(fieldCount,'field')}, ${plural(wfCount,'workflow')} match`;

  // Tier nodes by hop distance from the match set.
  const hop1 = matches.neighborhood().nodes().difference(matches);
  const hop2 = hop1.neighborhood().nodes().difference(matches).difference(hop1);
  cy.elements().addClass('m-dim');
  matches.removeClass('m-dim').addClass('m-match');
  hop1.removeClass('m-dim').addClass('m-hop1');
  hop2.removeClass('m-dim').addClass('m-hop2');

  // Tier edges by the tier of the nodes they connect.
  const tier1 = new Set(matches.union(hop1).map(n => n.id()));
  const tier2 = new Set(matches.union(hop1).union(hop2).map(n => n.id()));
  cy.edges().forEach(ed => {
    const s = ed.source().id(), t = ed.target().id();
    if (tier1.has(s) && tier1.has(t)) ed.removeClass('m-dim').addClass('m-edge1');
    else if (tier2.has(s) && tier2.has(t)) ed.removeClass('m-dim').addClass('m-edge2');
  });

  if (matches.nonempty()) {
    cy.animate({fit:{eles: matches, padding:90}}, {duration:350, easing:'ease-out'});
  }
}

document.getElementById('search').addEventListener('input', e => runSearch(e.target.value));

// Node filter toolbar — 6 categories with localStorage persistence per workspace slug.
// Four ordered passes, single-level (no fixpoint):
//   1. Category filters: hide nodes whose type/role checkbox is off.
//   2. Dangling-edge pass: hide edges with a filtered endpoint.
//   3. Filter-hygiene (always-on): nodes that have edges in the full graph but all
//      those edges are filtered get hidden too (no floating stranded nodes).
//   4. Orphaned toggle: hides base degree-0 ghosts (or nodes with data.orphaned=true).
const SLUG = location.pathname.split('/').slice(-2)[0] || 'ws';
const FILTER_KEY = 'explorer-filters-' + SLUG;
const DEFAULT_FILTERS = {wfLegacy:true, wfEngine:true, wfDisabled:true,
                         subforms:true, lookups:true, orphaned:true};
let filters = Object.assign({}, DEFAULT_FILTERS);
try {
  const saved = JSON.parse(localStorage.getItem(FILTER_KEY) || 'null');
  if (saved && typeof saved === 'object') Object.assign(filters, saved);
} catch(e) {}

function saveFilters(){
  try { localStorage.setItem(FILTER_KEY, JSON.stringify(filters)); } catch(e) {}
}

function applyFilters(){
  cy.elements().removeClass('filtered');

  // Pass 1 — category filters
  cy.nodes().forEach(n => {
    const kind = n.data('kind');
    const role = n.data('role');
    if (kind === 'workflow'){
      const isLegacy = n.data('workflowType') === 'Legacy';
      const isDisabled = n.hasClass('wf-off');
      if ((isLegacy && !filters.wfLegacy) || (!isLegacy && !filters.wfEngine) ||
          (isDisabled && !filters.wfDisabled))
        n.addClass('filtered');
    } else if (kind === 'form'){
      if (role === 'Subform' && !filters.subforms) n.addClass('filtered');
      if (role === 'Lookup'  && !filters.lookups)  n.addClass('filtered');
    }
  });

  // Pass 2 — dangling edges: hide any edge touching a filtered endpoint
  cy.edges().forEach(e => {
    if (e.source().hasClass('filtered') || e.target().hasClass('filtered'))
      e.addClass('filtered');
  });

  // Pass 3 — filter-hygiene (always-on): nodes connected in the full graph but
  // left with zero visible edges after passes 1-2 are hidden to avoid stranding.
  cy.nodes().forEach(n => {
    if (n.hasClass('filtered')) return;
    const allEdges = n.connectedEdges();
    if (allEdges.length > 0 && allEdges.not('.filtered').empty())
      n.addClass('filtered');
  });

  // Pass 4 — orphaned toggle: base degree-0 ghosts (disconnected before any
  // filtering, or explicitly tagged orphaned). The checkbox only governs these;
  // connected nodes isolated by passes 1-3 are handled by filter-hygiene above.
  if (!filters.orphaned){
    cy.nodes().forEach(n => {
      if (n.hasClass('filtered')) return;
      if (n.data('orphaned') === true || n.connectedEdges().length === 0)
        n.addClass('filtered');
    });
  }

  const anyOff = !Object.values(filters).every(Boolean);
  document.getElementById('filter-btn').classList.toggle('active', anyOff);
  saveFilters();
}

function toggleFilterMenu(){
  document.getElementById('filter-menu').classList.toggle('open');
}

document.addEventListener('click', e => {
  const wrap = document.getElementById('filter-wrap');
  if (wrap && !wrap.contains(e.target))
    document.getElementById('filter-menu').classList.remove('open');
});

document.querySelectorAll('#filter-menu input[type=checkbox]').forEach(cb => {
  cb.checked = filters[cb.dataset.filter] !== false;
  cb.addEventListener('change', () => {
    filters[cb.dataset.filter] = cb.checked;
    applyFilters();
  });
});

applyFilters();

// Field display mode (name vs label) and sort mode. Both persisted per-browser.
const FIELD_DISPLAY_KEY = 'explorer-field-display';

try { fieldDisplayMode = localStorage.getItem(FIELD_DISPLAY_KEY) || 'name'; } catch(e) {}
